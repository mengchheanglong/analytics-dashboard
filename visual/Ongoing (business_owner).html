<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angkoro · Store Overview — River &amp; Reed</title>
<style>
  :root{
    --bg:#f8faf9; --surface:#fff; --ink:#0b1e17; --muted:#5b6b63;
    --border:rgba(1,51,38,0.07); --soft:#f1f5f3;
    --accent:#15c089; --accent-fg:#032218; --primary:#013326; --primary-fg:#fff;
    --success:#0b8a5e; --warning:#b45309; --destructive:#c2410c;
    --shadow-card:0 0 0 1px rgba(1,51,38,0.06),0 2px 8px rgba(1,51,38,0.04);
    --shadow-raised:0 0 0 1px rgba(1,51,38,0.08),0 8px 28px rgba(1,51,38,0.08);
    --radius:8px; --radius-sm:6px;
    --font:Inter,system-ui,-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --bg:#080d0b; --surface:#0f1713; --ink:#e4ede8; --muted:#7d9488;
    --border:rgba(255,255,255,0.06); --soft:#141d18;
    --accent:#15c089; --accent-fg:#032218; --primary:#15c089; --primary-fg:#032218;
    --success:#2bc48f; --warning:#e0a33f; --destructive:#f0714f;
    --shadow-card:0 0 0 1px rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.25);
    --shadow-raised:0 0 0 1px rgba(255,255,255,0.07),0 10px 30px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-width:320px}
  button,select{font:inherit;cursor:pointer;color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}

  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;overflow:auto}
  .brand{display:flex;align-items:center;gap:9px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .brand-mark{width:28px;height:28px;border-radius:var(--radius-sm);background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  [data-theme="dark"] .brand-mark{background:var(--accent);color:var(--accent-fg)}
  .brand b{font-size:13.5px;font-weight:600;letter-spacing:-.02em}
  .brand small{display:block;font-size:10.5px;color:var(--muted)}
  .nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 8px 4px;opacity:.7}
  .nav{display:grid;gap:1px}
  .nav-btn{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;color:var(--muted);padding:8px;border-radius:var(--radius-sm);font-size:13px;font-weight:450;text-align:left;transition:.1s}
  .nav-btn:hover{background:var(--soft);color:var(--ink)}
  .nav-btn.active{background:rgba(21,192,137,0.1);color:var(--accent);font-weight:550}
  .nav-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none}
  .nav-badge{margin-left:auto;font-size:10.5px;font-weight:600;border-radius:99px;padding:1px 7px;background:rgba(180,83,9,0.12);color:var(--warning)}
  .side-foot{margin-top:auto;padding:10px 6px 0;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:10px;font-weight:700;flex:none}
  .side-foot b{font-size:12px;display:block}.side-foot span{font-size:10.5px;color:var(--muted);display:block}

  main{grid-column:2;min-width:0}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:10px 24px;background:rgba(248,250,249,0.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  [data-theme="dark"] .topbar{background:rgba(8,13,11,0.88)}
  .btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);font-size:12px;font-weight:500;transition:.1s}
  .btn:hover{border-color:rgba(1,51,38,0.15);background:var(--soft)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-fg);font-weight:550}
  .btn.primary:hover{background:#0a4636;border-color:#0a4636}
  [data-theme="dark"] .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
  [data-theme="dark"] .btn.primary:hover{background:#10a374;border-color:#10a374}
  .btn.danger{color:var(--destructive);border-color:rgba(194,65,12,0.3)}
  .btn.danger:hover{background:rgba(194,65,12,0.06);border-color:rgba(194,65,12,0.45)}
  .btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7}
  .icon-btn{padding:0;justify-content:center;width:32px}
  .spacer{flex:1}

  .content{display:flex;flex-direction:column;padding:20px 24px 48px;max-width:1280px}
  .greet{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:10px}
  .greet h1{font-size:21px;font-weight:650;letter-spacing:-.03em}
  .greet p{font-size:12.5px;color:var(--muted);margin-top:2px}
  .live{color:var(--success);font-weight:600}
  .mono{font-family:ui-monospace,SFMono-Regular,monospace;font-size:11px}

  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px}
  .toolbar-label{font-size:11px;font-weight:550;color:var(--muted)}
  .segmented{display:inline-flex;background:var(--soft);border-radius:var(--radius-sm);padding:2px;gap:1px}
  .segment{border:0;background:transparent;color:var(--muted);font-size:12px;font-weight:500;border-radius:5px;padding:5px 11px;transition:.1s}
  .segment:hover{color:var(--ink)}
  .segment.active{background:var(--surface);color:var(--ink);font-weight:550;box-shadow:0 0 0 1px rgba(1,51,38,0.06),0 1px 2px rgba(1,51,38,0.04)}
  .freshness{margin-left:auto;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .freshness i{width:6px;height:6px;border-radius:50%;background:var(--success);flex:none}
  .freshness i.warn{background:var(--warning)}

  .alert-banner{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--radius);font-size:12px;line-height:1.45;margin-top:12px;background:rgba(180,83,9,0.06);border:1px solid rgba(180,83,9,0.2)}
  .alert-banner svg{width:16px;height:16px;stroke:var(--warning);fill:none;stroke-width:2;flex:none}
  .alert-banner b{color:var(--warning);font-weight:600}
  .alert-link{border:0;background:transparent;color:var(--accent);font-size:12px;font-weight:550;display:inline-flex;align-items:center;gap:3px;padding:0}
  .alert-link:hover{opacity:.8}
  .alert-link svg{width:12px;height:12px;stroke:var(--accent);stroke-width:2}

  .story{margin-top:24px}
  .story-head{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px}
  .story-title{font-size:13.5px;font-weight:650;letter-spacing:-.015em}
  .story-sub{font-size:12px;color:var(--muted);margin-top:1px}

  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .kpi{padding:16px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);display:flex;flex-direction:column}
  .kpi .lbl{font-size:12px;font-weight:550;color:var(--muted);display:flex;align-items:center;gap:6px}
  .kpi .val{margin-top:8px;font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1.05}
  .kpi .delta{margin-top:6px;font-size:12px;display:flex;align-items:center;gap:5px;color:var(--muted)}
  .kpi .delta b{font-weight:600}
  .kpi .delta b.up{color:var(--success)}
  .kpi .delta b.down{color:var(--destructive)}
  .spark{width:100%;height:36px;margin-top:10px;display:block}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;flex:none;line-height:1.5}
  .chip.stale{background:rgba(180,83,9,0.1);color:var(--warning)}
  .chip.off{background:var(--soft);color:var(--muted)}
  .chip.snap{background:rgba(21,192,137,0.09);color:var(--success)}
  .kpi.balance{background:linear-gradient(150deg,var(--surface),color-mix(in srgb,var(--accent) 4%,var(--surface)))}
  .kpi.balance .snap-meta{margin-top:6px;font-size:11.5px;color:var(--muted)}
  .kpi .card-link{margin-top:auto;padding-top:10px;border:0;background:transparent;color:var(--accent);font-size:12px;font-weight:550;display:inline-flex;align-items:center;gap:4px;align-self:flex-start}
  .kpi .card-link:hover{opacity:.8}
  .kpi .card-link svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

  .queue-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .queue{border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);overflow:hidden;display:flex;flex-direction:column}
  .q-head{display:flex;align-items:flex-start;gap:9px;padding:13px 14px 11px}
  .q-ico{width:28px;height:28px;border-radius:var(--radius-sm);display:grid;place-items:center;flex:none}
  .q-ico svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.7;fill:none}
  .q-ico.warn{background:rgba(180,83,9,0.1);color:var(--warning)}
  .q-ico.crit{background:rgba(194,65,12,0.1);color:var(--destructive)}
  .q-head h3{font-size:13px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:5px}
  .q-head p{font-size:11px;color:var(--muted);margin-top:1px}
  .q-count{margin-left:auto;font-size:20px;font-weight:700;letter-spacing:-.03em;line-height:1.2}
  .q-rows{list-style:none;padding:0;border-top:1px solid var(--border);flex:1}
  .q-row{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--border);width:100%;text-align:left;background:none;border-left:0;border-right:0;transition:.1s}
  button.q-row{border-top:0;cursor:pointer}
  .q-row:last-child{border-bottom:0}
  .q-row:hover{background:var(--soft)}
  .q-row .t{font-weight:550;font-size:12.5px}
  .q-row .m{font-size:11px;color:var(--muted);margin-top:1px}
  .tag{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;flex:none;font-variant-numeric:tabular-nums}
  .tag.crit{background:rgba(194,65,12,0.1);color:var(--destructive)}
  .tag.warn{background:rgba(180,83,9,0.1);color:var(--warning)}
  .tag.neutral{background:var(--soft);color:var(--muted)}
  .q-act{margin-left:auto;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:500;border-radius:5px;padding:4px 9px;flex:none;transition:.1s}
  .q-act:hover{border-color:var(--accent);color:var(--accent)}
  .q-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 14px;border-top:1px solid var(--border);font-size:10.5px;color:var(--muted);background:var(--soft)}
  .q-foot button{border:0;background:transparent;color:var(--accent);font-size:11px;font-weight:550;padding:0;flex:none}
  .q-foot button:hover{opacity:.8}
  .caught-up{display:flex;gap:10px;align-items:center;padding:14px 16px;background:rgba(11,138,94,0.06);border:1px solid rgba(11,138,94,0.2);border-radius:var(--radius);font-size:12.5px;grid-column:1/-1}
  .caught-up svg{width:28px;height:28px;border-radius:50%;background:var(--success);color:#fff;stroke:currentColor;fill:none;stroke-width:2;padding:6px;flex:none}
  .panel h3 svg,.setup-card h3 svg{stroke:currentColor;fill:none}
  .caught-up b{font-weight:600}
  .caught-up p{font-size:11.5px;color:var(--muted)}

  .split-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:12px;align-items:start}
  .panel{padding:14px 16px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .panel h3{font-size:13px;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:5px}
  .panel .sub{font-size:11px;color:var(--muted);margin-top:1px}
  .aov-val{font-size:22px;font-weight:700;letter-spacing:-.025em;margin-top:10px}
  .aov-delta{margin-top:5px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .aov-delta b.up{color:var(--success)}.aov-delta b.down{color:var(--destructive)}
  .aov-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5;padding-top:8px;border-top:1px solid var(--border)}
  .p-row{display:grid;grid-template-columns:22px minmax(0,1.2fr) minmax(90px,1fr) 48px;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
  .p-row:last-of-type{border-bottom:0}
  .rank{font-size:10.5px;color:var(--muted);font-family:ui-monospace,monospace}
  .p-name{font-size:12.5px;font-weight:550}
  .p-sku{font-size:10.5px;color:var(--muted);margin-top:1px}
  .bar-track{height:6px;border-radius:0 4px 4px 0;background:var(--soft);overflow:hidden}
  .bar{height:100%;border-radius:0 4px 4px 0;background:var(--accent)}
  .units{font-size:12px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
  .panel-foot{font-size:10.5px;color:var(--muted);margin-top:8px}

  .ready-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--border);font-size:12px}
  .ready-row:first-of-type{border-top:0}
  .ready-row svg{width:14px;height:14px;stroke:var(--warning);fill:none;stroke-width:2;flex:none}
  .ready-row .m{font-size:10.5px;color:var(--muted)}
  .ready-row .q-act{margin-left:auto}
  .ready-foot{font-size:11px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:5px}
  .ready-foot svg{width:13px;height:13px;stroke:var(--success);fill:none;stroke-width:2}

  .setup-card{padding:16px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .setup-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--border);font-size:12px}
  .setup-row:first-of-type{border-top:0;margin-top:8px}
  .setup-row svg{width:14px;height:14px;stroke:var(--success);fill:none;stroke-width:2;flex:none}
  .setup-row.todo svg{stroke:var(--warning)}
  .setup-row span:last-child{margin-left:auto;font-size:10.5px;color:var(--muted)}

  .layer{position:fixed;inset:0;z-index:40;display:none}.layer.open{display:block}
  .scrim{position:absolute;inset:0;background:rgba(1,20,12,0.35);backdrop-filter:blur(3px)}
  .drawer{position:absolute;top:0;right:0;height:100%;width:min(400px,100%);background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-raised);padding:18px;overflow:auto;animation:slide .15s ease}
  @keyframes slide{from{transform:translateX(12px);opacity:.4}to{transform:none;opacity:1}}
  .drawer h2{font-size:15px;font-weight:650;letter-spacing:-.02em;margin-bottom:2px}
  .drawer .dsub{font-size:11.5px;color:var(--muted);margin-bottom:12px}
  .d-close{float:right;border:1px solid var(--border);background:var(--surface);width:28px;height:28px;border-radius:5px;font-size:13px;color:var(--muted)}
  .d-close:hover{color:var(--ink)}
  .d-kv{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
  .d-kv div{border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px}
  .d-kv span{font-size:10px;color:var(--muted);display:block}
  .d-kv b{font-size:13.5px;font-weight:650;letter-spacing:-.01em}
  .d-items{border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:4px}
  .d-item{display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px}
  .d-item:last-child{border-bottom:0}
  .d-item span{color:var(--muted)}
  .d-steps{border-left:1px solid var(--border);margin-top:8px}
  .d-step{padding:8px 0 8px 20px;position:relative}
  .d-step:before{content:"";position:absolute;left:-3px;top:13px;width:6px;height:6px;border-radius:50%;background:var(--warning)}
  .d-step b{font-size:12px}.d-step p{font-size:11px;color:var(--muted);margin:1px 0 0;line-height:1.45}
  .d-actions{display:flex;gap:8px;margin-top:14px}
  .d-note{font-size:10.5px;color:var(--muted);margin-top:10px;line-height:1.5}

  .toast{position:fixed;z-index:60;bottom:18px;left:50%;transform:translate(-50%,140px);background:var(--ink);color:var(--bg);font-size:12.5px;font-weight:550;padding:10px 14px;border-radius:var(--radius-sm);box-shadow:var(--shadow-raised);transition:.2s;pointer-events:none}
  .toast.show{transform:translate(-50%,0)}
  .mobile-menu{display:none}

  @media(max-width:1000px){
    .queue-grid{grid-template-columns:1fr 1fr}
    .split-grid{grid-template-columns:1fr}
    .kpi-grid{grid-template-columns:1fr 1fr}
    .kpi.balance{grid-column:1/-1}
  }
  @media(max-width:740px){
    .app{grid-template-columns:1fr}
    main{grid-column:1}
    .sidebar{position:fixed;z-index:50;width:240px;transform:translateX(-100%);transition:.2s}
    .sidebar.open{transform:none}
    .mobile-menu{display:inline-flex}
    .content{padding:14px 12px 40px}
    .topbar{padding:8px 12px}
    .kpi-grid,.queue-grid,.split-grid{grid-template-columns:1fr}
    .freshness{margin-left:0;width:100%}
    .greet{order:0}.toolbar{order:1}.alert-banner{order:2}
    .story-health{order:4}.story-attn{order:5}.story-support{order:6}.story-ready{order:7}
    .story-attn.has-work{order:3}
  }
  @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="root"></div>
<div id="layer-root"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(()=>{
const I={
  dash:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
  orders:'<svg viewBox="0 0 24 24"><path d="M6 3h12l2 4-8 5-8-5zM4 7v11l8 4 8-4V7M12 12v10"/></svg>',
  box:'<svg viewBox="0 0 24 24"><path d="m3 7 9-4 9 4-9 4zM3 7v10l9 4 9-4V7M12 11v10"/></svg>',
  layers:'<svg viewBox="0 0 24 24"><path d="m12 2 9 5-9 5-9-5zM3 12l9 5 9-5M3 17l9 5 9-5"/></svg>',
  chart:'<svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 16v-4M12 16V7M16 16v-7"/></svg>',
  wallet:'<svg viewBox="0 0 24 24"><path d="M4 7h15a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h12M16 13h4"/></svg>',
  settings:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="m19.4 15 .1 2.2-2.1 1.2-1.7-1a7.8 7.8 0 0 1-1.8 1l-.1 2H11l-.9-2a7.8 7.8 0 0 1-1.8-1l-1.7 1-2.1-1.2.1-2.2a8.3 8.3 0 0 1 0-2l-.1-2.2 2.1-1.2 1.7 1a7.8 7.8 0 0 1 1.8-1l.9-2h2l.9 2a7.8 7.8 0 0 1 1.8 1l1.7-1 2.1 1.2-.1 2.2a8.3 8.3 0 0 1 0 2Z"/></svg>',
  bell:'<svg viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 22h4"/></svg>',

function deltaHtml(cur,prev,label){
  if(!prev)return`<span>no previous-period data</span>`;
  const p=(cur-prev)/prev*100;
  if(Math.abs(p)<0.05)return`<b>—</b><span>flat vs prev ${label}</span>`;
  const up=p>0;
  return`<b class="${up?'up':'down'}">${up?'↑':'↓'} ${Math.abs(p).toFixed(1)}%</b><span>vs prev ${label}</span>`;
}
/* 2px line + 10% area wash, drawn from the real series */
function spark(series){
  const w=280,h=36,p=4,min=Math.min(...series),max=Math.max(...series),r=(max-min)||1;
  const pts=series.map((v,i)=>[p+i*(w-2*p)/(series.length-1),h-p-((v-min)/r)*(h-2*p)]);
  const line=pts.map((pt,i)=>(i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1)).join('');
  const area=line+`L${pts[pts.length-1][0].toFixed(1)} ${h-1}L${pts[0][0].toFixed(1)} ${h-1}Z`;
  return`<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
    <path d="${area}" fill="var(--accent)" opacity=".1"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/></svg>`;
}

let lastFocus=null;

/* ---------------- actions ---------------- */
function applyScenario(){
  if(state.scenario==='healthy'||state.scenario==='new'){state.counts={decide:0,fulfill:0,stock:0};state.totals={decide:0,fulfill:0,stock:0}}
  else{state.counts={decide:3,fulfill:4,stock:5};state.totals={decide:4,fulfill:5,stock:6}}
}
function act(a){
  if(a==='theme'){state.theme=state.theme==='dark'?'light':'dark';localStorage.setItem('angkoro-theme',state.theme);return render()}
  if(a==='menu'){state.sidebar=!state.sidebar;return render()}
  if(a==='notif')return toast(state.counts.decide?`${state.counts.decide} order decisions waiting`:'No urgent items');
  if(a==='view-store')return toast('Opens your live storefront');
  if(a==='open-finance')return toast('Opens Finance — full money lifecycle (pending, escrow, payouts)');
  if(a==='readiness')return readinessDrawer();
  if(a==='fix-start')return toast('Setup workflow opened');
  if(a==='go-decide')return toast('Opens Orders — nearest deadline first');
  if(a==='go-fulfill')return toast('Opens Orders — oldest accepted first');
  if(a==='go-stock')return toast('Opens Inventory — out of stock first');
  if(a==='open-in-orders')return toast('Opens Orders — this order focused for accept/reject');
  if(a==='fulfill')return toast('Opens Orders — fulfillment workflow for this order');
  if(a==='restock')return toast('Opens Inventory — restock workflow for this item');
}
function bind(){
  document.querySelectorAll('[data-act]').forEach(x=>x.onclick=e=>{e.stopPropagation();act(x.dataset.act)});
  document.querySelectorAll('[data-order]').forEach(x=>x.onclick=()=>orderDrawer(+x.dataset.order));
  document.querySelectorAll('[data-scenario]').forEach(x=>x.onclick=()=>{state.scenario=x.dataset.scenario;applyScenario();render()});
  document.querySelectorAll('[data-period]').forEach(x=>x.onclick=()=>{state.period=x.dataset.period;render()});
  document.querySelectorAll('[data-nav]').forEach(x=>x.onclick=()=>{if(x.dataset.nav==='overview')return;toast(`Go to ${x.textContent.trim()}`)});
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});
render();
})();
</script>
</body>
</html>
