<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angkoro · Store Dashboard</title>
<style>
  :root{
    --bg:#f8faf9; --surface:#fff; --ink:#0b1e17; --muted:#5b6b63;
    --border:rgba(1,51,38,0.07); --soft:#f1f5f3;
    --accent:#15c089; --accent-fg:#032218; --primary:#013326; --primary-fg:#fff;
    --success:#0b8a5e; --warning:#b45309; --destructive:#c2410c;
    --shadow-card:0 0 0 1px rgba(1,51,38,0.06),0 2px 8px rgba(1,51,38,0.04);
    --shadow-raised:0 0 0 1px rgba(1,51,38,0.08),0 8px 28px rgba(1,51,38,0.08);
    --radius:6px; --radius-lg:8px;
    --font:Inter,system-ui,-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --bg:#080d0b; --surface:#0f1713; --ink:#e4ede8; --muted:#7d9488;
    --border:rgba(255,255,255,0.06); --soft:#141d18;
    --accent:#15c089; --accent-fg:#032218; --primary:#15c089; --primary-fg:#032218;
    --success:#2bc48f; --warning:#e0a33f; --destructive:#f0714f;
    --shadow-card:0 0 0 1px rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.25);
    --shadow-raised:0 0 0 1px rgba(255,255,255,0.07),0 10px 30px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-width:320px}
  button,select{font:inherit;cursor:pointer;color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;overflow:auto}
  .brand{display:flex;align-items:center;gap:8px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .brand-mark{width:26px;height:26px;border-radius:var(--radius);background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  [data-theme="dark"] .brand-mark{background:var(--accent);color:var(--accent-fg)}
  .brand b{font-size:13px;font-weight:600;letter-spacing:-.02em}.brand small{display:block;font-size:9.5px;color:var(--muted)}
  .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 8px 3px;opacity:.65}
  .nav{display:grid;gap:1px}
  .nav-btn{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;color:var(--muted);padding:7px 8px;border-radius:5px;font-size:12.5px;font-weight:450;text-align:left;transition:.1s}
  .nav-btn:hover{background:var(--soft);color:var(--ink)}
  .nav-btn.active{background:rgba(21,192,137,0.1);color:var(--accent);font-weight:550}
  [data-theme="dark"] .nav-btn.active{color:var(--accent)}
  .nav-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none}
  .nav-badge{margin-left:auto;font-size:9.5px;font-weight:600;border-radius:99px;padding:1.5px 6px;background:rgba(180,83,9,0.12);color:var(--warning)}
  .side-foot{margin-top:auto;padding:8px 6px 0;border-top:1px solid var(--border);display:flex;gap:7px;align-items:center}
  .avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:9.5px;font-weight:700;flex:none}
  .side-foot b{font-size:11px}.side-foot span{font-size:9.5px;color:var(--muted)}
  main{grid-column:2;min-width:0}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 20px;background:rgba(248,250,249,0.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  [data-theme="dark"] .topbar{background:rgba(8,13,11,0.88)}
  .btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border:1px solid var(--border);background:var(--surface);border-radius:5px;font-size:11.5px;font-weight:500;transition:.1s;box-shadow:0 0 0 1px transparent}
  .btn:hover{border-color:rgba(1,51,38,0.15);background:var(--soft)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-fg);font-weight:550}
  .btn.primary:hover{background:#0a4636;border-color:#0a4636}
  [data-theme="dark"] .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
  [data-theme="dark"] .btn.primary:hover{background:#10a374;border-color:#10a374}
  .btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7}
  .spacer{flex:1}
  .content{padding:16px 20px 40px;max-width:1280px}
  .greet{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:8px;margin-bottom:12px}
  .greet h1{font-size:20px;font-weight:650;letter-spacing:-.035em}
  .greet p{font-size:12px;color:var(--muted);margin-top:2px}
  .live{color:var(--success);font-weight:600}.mono{font-family:ui-monospace,SFMono-Regular,monospace;font-size:10.5px}
  .scenario-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .scenario-row span{font-size:10px;font-weight:550;color:var(--muted)}
  .segmented{display:inline-flex;background:var(--soft);border-radius:5px;padding:2px;gap:1px}
  .segment{border:0;background:transparent;color:var(--muted);font-size:11px;font-weight:500;border-radius:4px;padding:4px 10px;transition:.1s}
  .segment:hover{color:var(--ink)}
  .segment.active{background:var(--surface);color:var(--ink);font-weight:550;box-shadow:0 0 0 1px rgba(1,51,38,0.06),0 1px 2px rgba(1,51,38,0.04)}
  .filters{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .pill{padding:5px 10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:500;border-radius:99px}
  .pill.active{background:var(--primary);border-color:var(--primary);color:var(--primary-fg)}
  [data-theme="dark"] .pill.active{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
  .freshness{margin-left:auto;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .freshness i{width:5px;height:5px;border-radius:50%;background:var(--success)}
  .alert-banner{display:flex;align-items:center;gap:9px;padding:10px 13px;background:rgba(180,83,9,0.06);border:1px solid rgba(180,83,9,0.2);border-radius:var(--radius);font-size:11.5px;margin-bottom:10px;line-height:1.4}
  .alert-banner svg{width:15px;height:15px;stroke:var(--warning);fill:none;stroke-width:2;flex:none}
  .alert-banner b{color:var(--warning);font-weight:600}
  .story{margin-top:18px}
  .story-head{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:6px}
  .story-title{font-size:12.5px;font-weight:600;letter-spacing:-.015em}
  .story-sub{font-size:11px;color:var(--muted)}
  .story-link{border:0;background:transparent;color:var(--accent);font-size:11px;font-weight:550;display:inline-flex;align-items:center;gap:3px;padding:2px 0}
  [data-theme="dark"] .story-link{color:var(--accent)}
  .story-link:hover{opacity:.8}
  .story-link svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .kpi.balance{background:linear-gradient(150deg,var(--surface),color-mix(in srgb,var(--accent) 3%,var(--surface)))}
  .kpi.aov{background:var(--surface)}
  .kpi{padding:13px 14px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .kpi .lbl{font-size:10.5px;font-weight:550;color:var(--muted);display:flex;align-items:center;gap:5px}
  .idtag{font-family:ui-monospace,SFMono-Regular,monospace;font-size:8px;color:var(--muted);border:1px solid var(--border);border-radius:3px;padding:1px 3px;flex:none;margin-left:auto;opacity:.7}
  .kpi .val{margin-top:5px;font-size:22px;font-weight:700;letter-spacing:-.04em;line-height:1.05}
  .kpi .val.accent{color:var(--accent)}
  .kpi .delta{margin-top:4px;font-size:10.5px;display:flex;align-items:center;gap:3px;color:var(--muted)}
  .kpi .delta b.up{color:var(--success)}.kpi .delta b.down{color:var(--destructive)}
  .spark{width:100%;height:26px;margin-top:5px;overflow:visible}
  .queue-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .queue{border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);overflow:hidden}
  .q-head{display:flex;align-items:flex-start;gap:8px;padding:10px 12px}
  .q-ico{width:26px;height:26px;border-radius:5px;display:grid;place-items:center;flex:none}
  .q-ico svg{width:13px;height:13px;stroke-width:1.7;fill:none}
  .q-ico.warn{background:rgba(180,83,9,0.1);color:var(--warning)}
  .q-ico.crit{background:rgba(194,65,12,0.1);color:var(--destructive)}
  .q-head h3{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;letter-spacing:-.01em}
  .q-head p{font-size:9.5px;color:var(--muted);margin-top:1px}
  .q-count{margin-left:auto;text-align:right}
  .q-count b{font-size:18px;font-weight:700;letter-spacing:-.035em;display:block;line-height:1}
  .q-rows{list-style:none;padding:0;border-top:1px solid var(--border)}
  .q-row{display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:1px solid var(--border);font-size:11px}
  .q-row:last-child{border-bottom:0}.q-row:hover{background:var(--soft)}
  .q-row .t{font-weight:550;font-size:10.5px}.q-row .m{font-size:9px;color:var(--muted);margin-top:1px}
  .tag{font-size:8px;font-weight:600;padding:1.5px 5px;border-radius:3px;white-space:nowrap;flex:none}
  .tag.crit{background:rgba(194,65,12,0.1);color:var(--destructive)}
  .tag.warn{background:rgba(180,83,9,0.1);color:var(--warning)}
  .tag.info{background:rgba(21,192,137,0.1);color:var(--accent)}
  .q-act{margin-left:auto;border:1px solid var(--border);background:var(--surface);font-size:9.5px;font-weight:500;border-radius:4px;padding:3px 7px;flex:none}
  .q-act:hover{border-color:var(--accent);color:var(--accent)}
  .q-foot{padding:6px 12px;border-top:1px solid var(--border);font-size:9px;color:var(--muted)}
  .caught-up{display:flex;gap:9px;align-items:center;padding:10px;background:rgba(11,138,94,0.06);border:1px solid rgba(11,138,94,0.2);border-radius:var(--radius);font-size:11.5px;grid-column:1/-1}
  .caught-up svg{width:26px;height:26px;border-radius:50%;background:var(--success);color:#fff;padding:5px;flex:none}
  .attn-badge{display:inline-flex;align-items:center;gap:3px;padding:3.5px 9px;border-radius:99px;font-size:10px;font-weight:550;cursor:pointer;line-height:1}
  .attn-badge.warn{background:rgba(180,83,9,0.08);color:var(--warning)}
  .attn-badge.info{background:rgba(37,99,235,0.06);color:var(--info)}
  .attn-badge.crit{background:rgba(194,65,12,0.06);color:var(--destructive)}
  .attn-badge svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:1.8;flex:none}
  .attn-badge b{font-weight:700}
  .split-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:10px}
  .panel{padding:12px 13px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .panel h3{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;letter-spacing:-.01em}
  .panel .sub{font-size:9.5px;color:var(--muted);margin-top:1px}
  .tabs{display:flex;gap:1px;background:var(--soft);border-radius:5px;padding:1.5px;margin-left:auto}
  .tab{border:0;background:transparent;color:var(--muted);font-size:9.5px;font-weight:500;border-radius:4px;padding:3.5px 7px}
  .tab.active{background:var(--surface);color:var(--ink);font-weight:550;box-shadow:0 1px 2px rgba(1,51,38,0.04)}
  .p-row{display:grid;grid-template-columns:20px 1fr 76px 44px;align-items:center;gap:7px;padding:6.5px 0;border-bottom:1px solid var(--border);font-size:10.5px}
  .p-row:last-child{border-bottom:0}
  .rank{font-size:9.5px;color:var(--muted);font-family:ui-monospace,monospace}
  .p-name{font-size:10.5px;font-weight:550}.p-sku{font-size:8.5px;color:var(--muted);margin-top:1px}
  .bar-track{height:4px;border-radius:99px;background:var(--soft);overflow:hidden}
  .bar{height:100%;border-radius:99px;background:var(--accent)}
  .units{font-size:10px;text-align:right;font-weight:600}
  .aov-val{font-size:18px;font-weight:700;letter-spacing:-.03em;margin-top:6px}
  .aov-note{font-size:9.5px;color:var(--muted);margin-top:5px;line-height:1.4}
  .check{display:flex;align-items:center;gap:6px;padding:5.5px 0;border-top:1px solid var(--border);font-size:10px}
  .check:first-of-type{border-top:0}
  .check svg{width:13px;height:13px;stroke:var(--success);fill:none;stroke-width:2;flex:none}
  .check.warn svg{stroke:var(--warning)}
  .check span:last-child{margin-left:auto;font-size:8.5px;color:var(--muted)}
  .layer{position:fixed;inset:0;z-index:40;display:none}.layer.open{display:block}
  .scrim{position:absolute;inset:0;background:rgba(1,20,12,0.35);backdrop-filter:blur(3px)}
  .drawer{position:absolute;top:0;right:0;height:100%;width:min(380px,100%);background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-raised);padding:16px;overflow:auto;animation:slide .15s ease}
  @keyframes slide{from{transform:translateX(12px);opacity:.4}to{transform:none;opacity:1}}
  .drawer h2{font-size:14px;font-weight:650;letter-spacing:-.02em;margin-bottom:1px}
  .drawer .dsub{font-size:10px;color:var(--muted);margin-bottom:10px}
  .d-close{float:right;border:1px solid var(--border);background:var(--surface);width:26px;height:26px;border-radius:4px;font-size:12px;color:var(--muted)}
  .d-close:hover{color:var(--ink)}
  .d-kv{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
  .d-kv div{border:1px solid var(--border);border-radius:5px;padding:8px}
  .d-kv span{font-size:8.5px;color:var(--muted);display:block}
  .d-kv b{font-size:13px;font-weight:650;letter-spacing:-.02em}
  .d-steps{border-left:1px solid var(--border);margin-top:7px}
  .d-step{padding:7px 0 7px 20px;position:relative}
  .d-step:before{content:"";position:absolute;left:-3px;top:11px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .d-step.hold:before{background:var(--warning)}
  .d-step.bank:before{background:var(--muted)}
  .d-step b{font-size:11px}.d-step p{font-size:10px;color:var(--muted);margin:1px 0 0;line-height:1.4}
  .d-actions{display:flex;gap:6px;margin-top:12px}
  .toast{position:fixed;z-index:60;bottom:16px;left:50%;transform:translate(-50%,140px);background:var(--ink);color:var(--bg);font-size:11.5px;font-weight:550;padding:9px 13px;border-radius:6px;box-shadow:var(--shadow-raised);transition:.2s;pointer-events:none}
  .toast.show{transform:translate(-50%,0)}
  .mobile-menu{display:none}
  .setup-card{padding:14px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .setup-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-top:1px solid var(--border);font-size:10.5px}
  .setup-row:first-of-type{border-top:0;margin-top:6px}
  .setup-row svg{width:13px;height:13px;stroke:var(--success);fill:none;stroke-width:2;flex:none}
  .setup-row.todo svg{stroke:var(--warning)}
  .setup-row span:last-child{margin-left:auto;font-size:9px;color:var(--muted)}
  @media(max-width:1000px){.queue-grid{grid-template-columns:1fr 1fr}.split-grid{grid-template-columns:1fr}}
  @media(max-width:740px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;z-index:50;width:240px;transform:translateX(-100%);transition:.2s}
    .sidebar.open{transform:none}
    .mobile-menu{display:inline-flex}
    .content{padding:12px 10px 36px}
    .topbar{padding:7px 10px}
    .kpi-grid,.queue-grid,.split-grid{grid-template-columns:1fr}
    .freshness{margin-left:0;width:100%}
  }
  @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="root"></div>
<div id="layer-root"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(()=>{
const I={
  store:'<svg viewBox="0 0 24 24"><path d="M3 9l1.5-5h15L21 9M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9M9 20v-6h6v6"/></svg>',
  dash:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
  orders:'<svg viewBox="0 0 24 24"><path d="M6 3h12l2 4-8 5-8-5zM4 7v11l8 4 8-4V7M12 12v10"/></svg>',
  box:'<svg viewBox="0 0 24 24"><path d="m3 7 9-4 9 4-9 4zM3 7v10l9 4 9-4V7M12 11v10"/></svg>',

};
const state={theme:localStorage.getItem('angkoro-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'),period:'30D',sidebar:false,scenario:'urgent',prodTab:'top',counts:{decide:3,fulfill:4,stock:5}};
const P={"7D":{usd:1240,orders:31,delta:'8.2%'},"30D":{usd:4860,orders:121,delta:'12.4%'},"90D":{usd:13180,orders:337,delta:'16.8%'}};
const H={"7D":{usd:420,orders:6,delta:'4.6%'},"30D":{usd:2180,orders:34,delta:'4.6%'},"90D":{usd:6840,orders:112,delta:'5.0%'}};
const d=()=>state.scenario==='healthy'?H[state.period]:P[state.period];
const fmt=n=>n.toLocaleString('en-US',{maximumFractionDigits:0}),usd=n=>'$'+fmt(n),usd2=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function S(c){return`<svg class="spark" viewBox="0 0 120 24" preserveAspectRatio="none" aria-hidden="true"><path d="M0 19 C10 18 14 12 22 15 S36 18 44 12 S56 14 66 9 S80 12 90 8 S104 7 120 3" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round"/></svg>`}
function nav(id,label,ico,badge){return`<button class="nav-btn ${id==='overview'?'active':''}" data-nav="${id}">${I[ico]}<span>${label}</span>${badge?`<b class="nav-badge">${badge}</b>`:''}</button>`}
function sidebar(){return`<aside class="sidebar ${state.sidebar?'open':''}">
  <div class="brand"><div class="brand-mark">${I.store}</div><div><b>Store Dashboard</b><small>River & Reed · ${state.scenario==='new'?'setup':'live'}</small></div></div>
  <div class="nav-label">Workspace</div><div class="nav">${nav('overview','Overview','dash')}${nav('orders','Orders','orders',state.counts.decide||'')}${nav('products','Products','box')}${nav('inventory','Inventory','box',state.counts.stock||'')}</div>
  <div class="nav-label">Insights</div><div class="nav">${nav('analytics','Analytics','chart')}${nav('payments','Payments','wallet')}</div>
  <div class="side-foot"><div class="avatar">LM</div><div><b>Long Mengchheang</b><span>Owner</span></div></div></aside>`}
function topbar(){return`<header class="topbar">
  <button class="btn mobile-menu" data-act="menu" aria-label="Menu" style="padding:0;justify-content:center;width:30px">${I.menu}</button>
  <div class="spacer"></div>
  <button class="btn" data-act="view-store">${I.ext}View Store</button>
  <button class="btn" data-act="theme" aria-label="Theme" style="padding:0;justify-content:center;width:30px">${state.theme==='dark'?I.sun:I.moon}</button>
  <button class="btn" data-act="notif" aria-label="Notifications" style="padding:0;justify-content:center;width:30px;position:relative">${I.bell}${state.scenario==='urgent'?'<span style="position:absolute;top:4px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--warning)"></span>':''}</button></header>`}
function greet(){let sub=state.scenario==='new'?'Complete setup before relying on performance analytics.':state.scenario==='healthy'?'All quiet — no orders or inventory need immediate action.':'Urgent order decisions, fulfillment backlog, and inventory issues need attention.';
  return`<div class="greet"><div><h1>${new Date().getHours()<12?'Good morning':new Date().getHours()<18?'Good afternoon':'Good evening'}</h1><p>River & Reed is <span class="live">${state.scenario==='new'?'in setup':'live'}</span> at <span class="mono">river-reed.telestore.app</span> · ${sub}</p></div>
  ${state.scenario==='new'?'':attentionStrip()}</div>`}
function scenarioCtl(){return`<div class="scenario-row"><span>Store state</span><div class="segmented" role="group" aria-label="Store state">${['new','healthy','urgent'].map(s=>`<button class="segment ${state.scenario===s?'active':''}" data-scenario="${s}">${s[0].toUpperCase()+s.slice(1)}</button>`).join('')}</div></div>`}
function kpiRow(){let x=d();return`<div class="kpi-grid">
  <article class="kpi"><div class="lbl">Paid Sales<span class="idtag">BO-S01</span></div><div class="val accent">${usd(x.usd)}</div><div class="delta"><b class="up">↑ ${x.delta}</b>vs matched previous period</div>${S('var(--accent)')}</article>
  <article class="kpi"><div class="lbl">Paid Orders<span class="idtag">BO-S02</span></div><div class="val">${fmt(x.orders)}</div><div class="delta"><b class="up">↑ 9.1%</b>vs previous period</div>${S('#4e7cc2')}</article>
  <article class="kpi aov"><div class="lbl">Avg Paid Order Value<span class="idtag">BO-S04</span></div><div class="val">${usd2(x.usd/x.orders)}</div><div class="delta">Paid Sales ÷ Paid Orders · explains whether orders grew larger or smaller</div></article>
  <article class="kpi balance" style="cursor:pointer" data-act="open-finance"><div class="lbl">Available Balance<span class="idtag">BO-M01</span></div><div class="val">$780</div><div class="delta" style="color:var(--success)">As of now · Open Finance →</div></article>
</div>`}
function alertBanner(){if(state.scenario==='healthy')return'';return`<div class="alert-banner">${I.warn}<div><b>2 setup issues need attention</b> — your store can't accept payouts. <button class="story-link" data-act="readiness">Fix now${I.arrow}</button></div></div>`}
function qHead(ico,cls,title,sub,count,id){return`<div class="q-head"><div class="q-ico ${cls}">${I[ico]}</div><div><h3>${title}<span class="idtag">${id}</span></h3><p>${sub}</p></div><div class="q-count"><b>${count}</b></div></div>`}
function queues(){let c=state.counts;return`<div class="queue-grid">
  <article class="queue">${qHead('orders','warn','Orders Need Decision','Nearest deadline first',c.decide,'BO-O01')}
    <ul class="q-rows">
      <li class="q-row"><span class="tag crit">38m</span><div><div class="t">ORD-4839 · Dara Chum</div><div class="m">$68.00 · Online</div></div><button class="q-act" data-act="accept">Accept</button></li>
      <li class="q-row"><span class="tag warn">1h 12m</span><div><div class="t">ORD-4834 · Sokly</div><div class="m">$22.50 · COD</div></div><button class="q-act" data-act="accept">Accept</button></li>
      <li class="q-row"><span class="tag warn">3h 44m</span><div><div class="t">ORD-4828 · Lina V.</div><div class="m">$29.00 · Online</div></div><button class="q-act" data-act="accept">Accept</button></li>
    </ul>
    <div class="q-foot">Paid prepaid awaiting acceptance + COD awaiting decision.</div></article>
  <article class="queue">${qHead('box','crit','Fulfillment Backlog','Oldest accepted prepaid first',c.fulfill,'BO-F01')}
    <ul class="q-rows">
      <li class="q-row"><span class="tag crit">2d 4h</span><div><div class="t">ORD-4817</div><div class="m">2 items · Phnom Penh</div></div><button class="q-act" data-act="fulfill">Fulfill</button></li>
      <li class="q-row"><span class="tag info">1d 6h</span><div><div class="t">ORD-4822</div><div class="m">$42.00 · Prepaid</div></div><button class="q-act" data-act="fulfill">Fulfill</button></li>
      <li class="q-row"><span class="tag info">18h</span><div><div class="t">ORD-4826</div><div class="m">3 items · Prepaid</div></div><button class="q-act" data-act="fulfill">Fulfill</button></li>
    </ul>
    <div class="q-foot">Age shown · not overdue until a fulfillment SLA is adopted.</div></article>
  <article class="queue">${qHead('warn','crit','Inventory Attention','Out of Stock first, then Low Stock',c.stock,'BO-I05')}
    <ul class="q-rows">
      <li class="q-row"><span class="tag crit">OOS</span><div><div class="t">Canvas Market Tote</div><div class="m">Natural · CM-01</div></div><button class="q-act" data-act="restock">Restock</button></li>
      <li class="q-row"><span class="tag crit">OOS</span><div><div class="t">Sandalwood Candle</div><div class="m">Medium · SC-09</div></div><button class="q-act" data-act="restock">Restock</button></li>
      <li class="q-row"><span class="tag warn">Low·3</span><div><div class="t">Rattan Tray</div><div class="m">Large · RT-14</div></div><button class="q-act" data-act="restock">Restock</button></li>
    </ul>
    <div class="q-foot">Low = 1–5 available (v1 warning, not a demand forecast).</div></article>
</div>`}
function attentionStrip(){let c=state.counts;
  return`<div style="display:flex;align-items:center;gap:0;font-size:10.5px">
    <span style="display:inline-flex;align-items:center;gap:4px;padding:0 10px 0 0;border-right:1px solid var(--border);cursor:pointer;color:${c.decide>0?'var(--warning)':'var(--muted)'}" data-act="go-decide"><b style="font-size:13px;font-weight:700">${c.decide}</b><span style="color:var(--muted);font-weight:450">to decide</span></span>
    <span style="display:inline-flex;align-items:center;gap:4px;padding:0 10px;border-right:1px solid var(--border);cursor:pointer;color:${c.fulfill>0?'var(--warning)':'var(--muted)'}" data-act="go-fulfill"><b style="font-size:13px;font-weight:700">${c.fulfill}</b><span style="color:var(--muted);font-weight:450">to fulfill</span></span>
    <span style="display:inline-flex;align-items:center;gap:4px;padding:0 0 0 10px;cursor:pointer;color:${c.stock>0?'var(--destructive)':'var(--muted)'}" data-act="go-stock"><b style="font-size:13px;font-weight:700">${c.stock}</b><span style="color:var(--muted);font-weight:450">stock items</span></span>
  </div>`}
const top=[['01','Linen Weekend Bag','LN-30',92,100],['02','Rattan Tray — Large','RT-14',74,80],['03','Canvas Market Tote','CM-01',57,62],['04','Sandalwood Candle','SC-09',41,45]];
const attn=[['01','Dried Palm Vase','PV-12','Live 42d · 0 paid units'],['02','Gift Wrap Set','GW-04','Live 31d · 0 paid units'],['03','Ceramic Dish — Sand','CD-03','Live 21d · 0 paid units']];
function products(){let isTop=state.prodTab==='top';
  let rows=isTop?top.map(p=>`<div class="p-row"><span class="rank">${p[0]}</span><div><div class="p-name">${p[1]}</div><div class="p-sku">${p[2]}</div></div><div class="bar-track"><div class="bar" style="width:${p[4]}%"></div></div><div class="units">${p[3]}</div></div>`).join('')
    :attn.map(p=>`<div class="p-row"><span class="rank">${p[0]}</span><div><div class="p-name">${p[1]}</div><div class="p-sku">${p[2]}</div></div><div style="font-size:9.5px;color:var(--muted)">${p[3]}</div><button class="q-act" data-act="prod-review">Review</button></div>`).join('');
  return`<article class="panel"><div style="display:flex;align-items:center;gap:6px"><div><h3>Top Products<span class="idtag">BO-I01</span></h3><div class="sub">Ranked by paid units · ${state.period}</div></div>
    <div class="tabs"><button class="tab ${isTop?'active':''}" data-ptab="top">Top</button><button class="tab ${!isTop?'active':''}" data-ptab="attention">Attention</button></div></div>
    <div style="margin-top:6px">${rows}</div>
    <div style="font-size:9px;color:var(--muted);margin-top:5px">${isTop?'Paid units ≠ Paid Sales, profit, or demand forecast.':'Active, visible, in-stock items with zero paid units — safer than "worst sellers."'}</div></article>`}
function readiness(){let ok=state.scenario==='healthy';let checks=[['Store active',true],['Sellable product',true],['Checkout configured',true],['Payout bank account',ok],['Telegram notifications',ok],['Contact & fulfillment',true]];
  if(ok)return`<div class="panel" style="margin-top:10px"><h3 style="display:flex;align-items:center;gap:6px"><span style="width:16px;height:16px;flex:none">${I.check}</span><span style="color:var(--success)">Store Readiness</span><span class="idtag">BO-R01–R06</span></h3><div class="sub">All checks passing.</div></div>`;
  return`<div class="panel" style="margin-top:10px"><h3 style="display:flex;align-items:center;gap:6px"><span style="width:16px;height:16px;flex:none">${I.warn}</span><span style="color:var(--warning)">Store Readiness</span><span class="idtag">BO-R01–R06</span></h3>
  ${checks.map(c=>`<div class="check ${c[1]?'':'warn'}" style="margin-top:2px">${c[1]?I.check:I.warn}<span>${c[0]}</span><span>${c[1]?'Ready':'Fix now'}</span></div>`).join('')}</div>`}
function setupView(){let steps=[['Store active',true],['Sellable product',false],['Checkout configured',false],['Payout bank verified',false],['Telegram enabled',false],['Contact & fulfillment',false]];
  return`<section class="story"><div class="story-head"><h2 class="story-title">Store setup</h2></div>
  <div class="setup-card"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><div class="q-ico warn">${I.warn}</div><div><h3 style="font-size:12px;font-weight:600">Store Readiness<span class="idtag">BO-R01–R06</span></h3><div class="sub">1 of 6 complete</div></div></div>
  ${steps.map(c=>`<div class="setup-row ${c[1]?'':'todo'}">${c[1]?I.check:I.warn}<span>${c[0]}</span><span>${c[1]?'Done':'Required'}</span></div>`).join('')}
  <div class="d-actions"><button class="btn primary" data-act="fix-start">Continue setup</button></div></div></section>`}
function view(){
  let body;
  if(state.scenario==='new'){body=setupView()}
  else {
    const hl=`<section class="story"><div class="story-head"><div><h2 class="story-title">Business health</h2><div class="story-sub">Valid paid business in the selected period.</div></div><div class="segmented" role="group" aria-label="Period">${['7D','30D','90D'].map(p=>`<button class="segment ${state.period===p?'active':''}" data-period="${p}" ${state.scenario==='new'?'disabled':''}>${p}</button>`).join('')}</div></div>${kpiRow()}</section>`;
    const expl=`<section class="story"><div class="story-head"><h2 class="story-title">Top products</h2></div>${products()}</section>`;
    const ready=`<section class="story"><div class="story-head"><h2 class="story-title">Store readiness</h2></div>${readiness()}</section>`;
    body=hl+expl+ready;
  }
  return`${topbar()}<div class="content">${greet()}${scenarioCtl()}${alertBanner()}${body}</div>`;
}
function render(){document.documentElement.dataset.theme=state.theme;document.getElementById('root').innerHTML=`<div class="app">${sidebar()}<main>${view()}</main></div>`;bind()}
function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),2000)}
function openDrawer(k){
  let b=k==='readiness'?{t:'Fix Store Readiness',s:'2 checks need attention',body:`<div class="d-steps"><div class="d-step hold"><b>Verify payout bank account</b><p>Open Payments — full details never show on Overview.</p></div><div class="d-step hold"><b>Reconnect Telegram notifications</b><p>Order alerts disabled; reconnect so you never miss a decision deadline.</p></div></div><div class="d-actions"><button class="btn primary" data-act="fix-start">Start setup</button></div>`}:null;
  if(!b)return;
  document.getElementById('layer-root').innerHTML=`<div class="layer open"><div class="scrim" data-close></div><aside class="drawer" role="dialog" aria-modal="true"><button class="d-close" data-close>✕</button><h2>${b.t}</h2><div class="dsub">${b.s}</div>${b.body}</aside></div>`;
  document.querySelectorAll('[data-close]').forEach(x=>x.onclick=()=>document.getElementById('layer-root').innerHTML='');
  document.querySelectorAll('.drawer [data-act]').forEach(x=>x.onclick=()=>{document.getElementById('layer-root').innerHTML='';act(x.dataset.act)});
}
function act(a){
  if(a==='theme'){state.theme=state.theme==='dark'?'light':'dark';localStorage.setItem('angkoro-theme',state.theme);return render()}
  if(a==='menu'){state.sidebar=!state.sidebar;return render()}
  if(a==='notif')return toast(state.scenario==='urgent'?'3 order decisions + 2 setup checks':'No urgent items');
  if(a==='view-store')return toast('Opens your live storefront');
  if(a==='open-finance')return toast('Opens Finance page — full money lifecycle');
  if(a==='readiness')return openDrawer('readiness');
  if(a==='fix-start')return toast('Setup workflow opened');
  if(a==='go-decide'){state.counts.decide=Math.max(0,state.counts.decide-1);render();return toast('Nearest deadline first')}
  if(a==='go-fulfill'){state.counts.fulfill=Math.max(0,state.counts.fulfill-1);render();return toast('Oldest accepted first')}
  if(a==='go-stock'){state.counts.stock=Math.max(0,state.counts.stock-1);render();return toast('Out of stock first')}
  if(a==='accept'){state.counts.decide=Math.max(0,state.counts.decide-1);render();return toast('Order accepted')}
  if(a==='fulfill'){state.counts.fulfill=Math.max(0,state.counts.fulfill-1);render();return toast('Order fulfilled')}
  if(a==='restock')return toast('Restock task created');
  if(a==='prod-review')return toast('Listing review opened');
}
function bind(){
  document.querySelectorAll('[data-act]').forEach(x=>x.onclick=()=>act(x.dataset.act));
  document.querySelectorAll('[data-ptab]').forEach(x=>x.onclick=()=>{state.prodTab=x.dataset.ptab;render()});
  document.querySelectorAll('[data-scenario]').forEach(x=>x.onclick=()=>{state.scenario=x.dataset.scenario;applyS();render()});
  document.querySelectorAll('[data-period]').forEach(x=>x.onclick=()=>{if(state.scenario==='new')return;state.period=x.dataset.period;render()});
  document.querySelectorAll('[data-nav]').forEach(x=>x.onclick=()=>{if(x.dataset.nav==='overview')return;toast(`Go to ${x.textContent.trim()}`)});
}
function applyS(){if(state.scenario==='healthy'||state.scenario==='new')state.counts={decide:0,fulfill:0,stock:0};else state.counts={decide:3,fulfill:4,stock:5}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('layer-root').innerHTML=''});
render();
})();
</script>
</body>
</html>
