<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angkoro · Analytics — River & Reed</title>
<style>
  :root{
    --bg:#f8faf9; --surface:#fff; --ink:#0b1e17; --muted:#5b6b63;
    --border:rgba(1,51,38,0.07); --soft:#f1f5f3;
    --accent:#15c089; --accent-fg:#032218; --primary:#013326; --primary-fg:#fff;
    --success:#0b8a5e; --warning:#b45309; --destructive:#c2410c; --info:#2563eb; --violet:#7c3aed;
    --shadow-card:0 0 0 1px rgba(1,51,38,0.06),0 2px 8px rgba(1,51,38,0.04);
    --radius:6px;
    --font:Inter,system-ui,-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --bg:#080d0b; --surface:#0f1713; --ink:#e4ede8; --muted:#7d9488;
    --border:rgba(255,255,255,0.06); --soft:#141d18;
    --accent:#15c089; --accent-fg:#032218; --primary:#15c089; --primary-fg:#032218;
    --success:#2bc48f; --warning:#e0a33f; --destructive:#f0714f;
    --shadow-card:0 0 0 1px rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.25);
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-width:320px}
  button{font:inherit;cursor:pointer}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;overflow:auto}
  .brand{display:flex;align-items:center;gap:8px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .brand-mark{width:26px;height:26px;border-radius:var(--radius);background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  [data-theme="dark"] .brand-mark{background:var(--accent);color:var(--accent-fg)}
  .brand b{font-size:13px;font-weight:600;letter-spacing:-.02em}
  .brand small{display:block;font-size:9.5px;color:var(--muted)}
  .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 8px 3px;opacity:.65}
  .nav{display:grid;gap:1px}
  .nav-btn{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;color:var(--muted);padding:7px 8px;border-radius:5px;font-size:12.5px;font-weight:450;text-align:left;transition:.1s}
  .nav-btn:hover{background:var(--soft);color:var(--ink)}
  .nav-btn.active{background:rgba(21,192,137,0.1);color:var(--accent);font-weight:550}
  .nav-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none}
  main{grid-column:2;min-width:0;padding:16px 20px 40px;max-width:1200px}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 20px;margin:-16px -20px 16px;background:rgba(248,250,249,0.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  [data-theme="dark"] .topbar{background:rgba(8,13,11,0.88)}
  .btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border:1px solid var(--border);background:var(--surface);border-radius:5px;font-size:11.5px;font-weight:500;transition:.1s;color:var(--ink)}
  .spacer{flex:1}
  .page-header{margin-bottom:16px}
  .page-header h1{font-size:20px;font-weight:700;letter-spacing:-.035em}
  .page-header p{font-size:11px;color:var(--muted);margin-top:2px}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .kpi{padding:13px 14px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .kpi .lbl{font-size:10.5px;font-weight:550;color:var(--muted)}
  .kpi .val{font-size:22px;font-weight:700;letter-spacing:-.04em;line-height:1.05;margin-top:4px}
  .kpi .val.em{color:var(--accent)}
  .kpi .sub{font-size:9.5px;color:var(--muted);margin-top:2px}
  .panel{border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);overflow:hidden;margin-bottom:16px}
  .panel-head{padding:12px 14px;border-bottom:1px solid var(--border)}
  .panel-head h2{font-size:13px;font-weight:600;letter-spacing:-.015em}
  .panel-head p{font-size:10px;color:var(--muted);margin-top:2px}
  .panel-body{padding:12px 14px}
  .chart{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:200px;padding:0 4px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
  .bar-col .bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;position:relative}
  .bar-col .bar{width:100%;border-radius:3px 3px 0 0;background:var(--accent);min-height:4px;transition:.15s;cursor:pointer}
  .bar-col .bar:hover{opacity:.7}
  .bar-col .amt{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;white-space:nowrap;opacity:0;transition:.1s;pointer-events:none}
  .bar-col:hover .amt{opacity:1}
  .bar-col .mo{font-size:9px;color:var(--muted)}
  .split2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .prod-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px}
  .prod-row:last-child{border-bottom:0}
  .prod-row .name{font-size:12px;font-weight:550}.prod-row .units{font-size:10px;color:var(--muted)}
  .prod-row .rev{font-size:12px;font-weight:650;font-family:ui-monospace,monospace}
  .status-row{margin-bottom:10px}
  .status-row:last-child{margin-bottom:0}
  .status-row .s-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .status-row .s-name{font-size:11px;font-weight:550;text-transform:capitalize}
  .status-row .s-count{font-size:10px;color:var(--muted)}
  .status-row .track{height:6px;border-radius:99px;background:var(--soft);overflow:hidden}
  .status-row .fill{height:100%;border-radius:99px}
  @media(max-width:740px){
    .app{grid-template-columns:1fr}
    .sidebar{display:none}
    main{padding:12px 10px 36px}
    .topbar{margin:-12px -10px 12px;padding:7px 10px}
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    .split2{grid-template-columns:1fr}
    .chart{height:160px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
(()=>{
const fmt=n=>'$'+(n/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const I={
  dash:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
  orders:'<svg viewBox="0 0 24 24"><path d="M6 3h12l2 4-8 5-8-5zM4 7v11l8 4 8-4V7M12 12v10"/></svg>',
  box:'<svg viewBox="0 0 24 24"><path d="m3 7 9-4 9 4-9 4zM3 7v10l9 4 9-4V7M12 11v10"/></svg>',
  wallet:'<svg viewBox="0 0 24 24"><path d="M4 7h15a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h12M16 13h4"/></svg>',
  chart:'<svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 16v-4M12 16V7M16 16v-7"/></svg>',
  settings:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="m19.4 15 .1 2.2-2.1 1.2-1.7-1a7.8 7.8 0 0 1-1.8 1l-.1 2H11l-.9-2a7.8 7.8 0 0 1-1.8-1l-1.7 1-2.1-1.2.1-2.2a8.3 8.3 0 0 1 0-2l-.1-2.2 2.1-1.2 1.7 1a7.8 7.8 0 0 1 1.8-1l.9-2h2l.9 2a7.8 7.8 0 0 1 1.8 1l1.7-1 2.1 1.2-.1 2.2a8.3 8.3 0 0 1 0 2Z"/></svg>',
  sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon:'<svg viewBox="0 0 24 24"><path d="M20.5 15.2A8.5 8.5 0 0 1 8.8 3.5 8.5 8.5 0 1 0 20.5 15.2Z"/></svg>',
};
const theme=localStorage.getItem('angkoro-theme')||'light';

const monthly=[{mo:'Jan',rev:320000},{mo:'Feb',rev:280000},{mo:'Mar',rev:410000},{mo:'Apr',rev:380000},{mo:'May',rev:510000},{mo:'Jun',rev:620000}];
const maxRev=Math.max(...monthly.map(m=>m.rev));

const products=[
  {name:'Linen Weekend Bag',units:12,revenue:168000},
  {name:'Rattan Tray — Large',units:9,revenue:126000},
  {name:'Canvas Market Tote',units:7,revenue:91000},
  {name:'Sandalwood Candle — Medium',units:5,revenue:55000},
  {name:'Ceramic Dish — Sand',units:4,revenue:32000},
];
const statuses=[{name:'Completed',count:8,color:'var(--success)'},{name:'Pending payment',count:3,color:'var(--warning)'},{name:'Accepted',count:4,color:'var(--info)'},{name:'Shipped',count:2,color:'var(--info)'},{name:'Rejected',count:1,color:'var(--destructive)'}];
const totalStatuses=statuses.reduce((s,x)=>s+x.count,0);

function nav(id,label,ico,active){return`<button class="nav-btn ${active?'active':''}" onclick="document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');toast('${label} page')">${I[ico]}<span>${label}</span></button>`}
function sidebar(){return`<aside class="sidebar">
  <div class="brand"><div class="brand-mark">RR</div><div><b>River & Reed</b><small>river-reed.telestore.app</small></div></div>
  <div class="nav-label">Workspace</div><div class="nav">${nav('overview','Overview','dash')}${nav('orders','Orders','orders')}${nav('products','Products','box')}${nav('inventory','Inventory','box')}</div>
  <div class="nav-label">Insights</div><div class="nav">${nav('analytics','Analytics','chart',true)}${nav('payments','Payments','wallet')}${nav('settings','Settings','settings')}</div></aside>`}
function topbar(){return`<header class="topbar"><div class="spacer"></div><button class="btn" onclick="(function(){let t=theme==='dark'?'light':'dark';localStorage.setItem('angkoro-theme',t);document.documentElement.dataset.theme=t;location.reload()})()">${theme==='dark'?I.sun:I.moon}</button></header>`}
function toast(m){if(typeof m!=='string')return;let e=document.createElement('div');e.textContent=m;e.style.cssText='position:fixed;z-index:60;bottom:16px;left:50%;transform:translate(-50%,140px);background:var(--ink);color:var(--bg);font-size:11.5px;font-weight:550;padding:9px 13px;border-radius:6px;box-shadow:0 10px 30px rgba(0,0,0,0.3);transition:.2s;pointer-events:none';document.body.appendChild(e);requestAnimationFrame(()=>e.style.transform='translate(-50%,0)');setTimeout(()=>{e.style.transform='translate(-50%,140px)';setTimeout(()=>e.remove(),200)},2000)}
document.documentElement.dataset.theme=theme;

const totalRev=472000, totalOrd=18, avgOrd=2622, prodSold=37;

document.getElementById('root').innerHTML=`<div class="app">${sidebar()}<main>${topbar()}
  <div class="page-header"><h1>Analytics</h1><p>Track your store performance and insights</p></div>
  <div class="kpi-grid">
    <div class="kpi"><div class="lbl">Total revenue</div><div class="val em">${fmt(totalRev)}</div><div class="sub">lifetime</div></div>
    <div class="kpi"><div class="lbl">Orders</div><div class="val">${totalOrd}</div><div class="sub">all time</div></div>
    <div class="kpi"><div class="lbl">Average order</div><div class="val">${fmt(avgOrd*100)}</div><div class="sub">per order</div></div>
    <div class="kpi"><div class="lbl">Products sold</div><div class="val">${prodSold}</div><div class="sub">units</div></div>
  </div>
  <div class="panel">
    <div class="panel-head"><h2>Revenue by Month</h2><p>Last 6 months of revenue (from recent orders)</p></div>
    <div class="panel-body">
      <div class="chart">${monthly.map(m=>{
        const h=Math.max((m.rev/maxRev)*100,4);
        return`<div class="bar-col">
          <div class="bar-wrap"><div class="bar" style="height:${h}%"><div class="amt">${fmt(m.rev)}</div></div></div>
          <div class="mo">${m.mo}</div></div>`}).join('')}</div>
    </div></div>
  <div class="split2">
    <div class="panel">
      <div class="panel-head"><h2>Top Selling Products</h2><p>By revenue from recent orders</p></div>
      <div class="panel-body">${products.map(p=>`<div class="prod-row">
        <div><div class="name">${p.name}</div><div class="units">${p.units} unit${p.units!==1?'s':''} sold</div></div>
        <div class="rev">${fmt(p.revenue)}</div></div>`).join('')}</div></div>
    <div class="panel">
      <div class="panel-head"><h2>Orders by Status</h2><p>Distribution of order statuses</p></div>
      <div class="panel-body">${statuses.map(s=>{
        const pct=Math.round((s.count/totalStatuses)*100);
        return`<div class="status-row">
          <div class="s-head"><span class="s-name">${s.name}</span><span class="s-count">${s.count} (${pct}%)</span></div>
          <div class="track"><div class="fill" style="width:${pct}%;background:${s.color}"></div></div></div>`}).join('')}</div></div>
  </div>
</main></div>`;
})();
</script>
</body>
</html>
