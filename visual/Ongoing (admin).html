<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angkoro · Platform Admin</title>
<style>
  :root{
    --bg:#f8faf9; --surface:#fff; --ink:#0b1e17; --muted:#5b6b63;
    --border:rgba(1,51,38,0.07); --soft:#f1f5f3;
    --accent:#15c089; --accent-fg:#032218; --primary:#013326; --primary-fg:#fff;
    --success:#0b8a5e; --warning:#b45309; --destructive:#c2410c; --info:#2563eb;
    --shadow-card:0 0 0 1px rgba(1,51,38,0.06),0 2px 8px rgba(1,51,38,0.04);
    --radius:6px; --font:Inter,system-ui,-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --bg:#080d0b; --surface:#0f1713; --ink:#e4ede8; --muted:#7d9488;
    --border:rgba(255,255,255,0.06); --soft:#141d18;
    --accent:#15c089; --accent-fg:#032218; --primary:#15c089; --primary-fg:#032218;
    --success:#2bc48f; --warning:#e0a33f; --destructive:#f0714f;
    --shadow-card:0 0 0 1px rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.25);
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font:inherit;cursor:pointer}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;overflow:auto;z-index:10}
  .brand{display:flex;align-items:center;gap:8px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .brand-mark{width:26px;height:26px;border-radius:var(--radius);background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  [data-theme="dark"] .brand-mark{background:var(--accent);color:var(--accent-fg)}
  .brand b{font-size:13px;font-weight:600;letter-spacing:-.02em}
  .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 8px 3px;opacity:.65}
  .nav{display:grid;gap:1px}
  .nv{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;color:var(--muted);padding:7px 8px;border-radius:5px;font-size:12.5px;font-weight:450;text-align:left;transition:.1s}
  .nv:hover{background:var(--soft);color:var(--ink)}
  .nv.active{background:rgba(21,192,137,0.1);color:var(--accent);font-weight:550}
  .nv svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none}
  .nv .badge-dot{margin-left:auto;font-size:9.5px;font-weight:600;border-radius:99px;padding:1.5px 6px;background:rgba(180,83,9,0.12);color:var(--warning)}
  .side-foot{margin-top:auto;padding:8px 6px 0;border-top:1px solid var(--border);display:flex;gap:7px;align-items:center;font-size:10px}
  .avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:9.5px;font-weight:700;flex:none}
  main{padding:16px 20px 40px;max-width:1280px}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 20px;margin:-16px -20px 16px;background:rgba(248,250,249,0.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  [data-theme="dark"] .topbar{background:rgba(8,13,11,0.88)}
  .btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border:1px solid var(--border);background:var(--surface);border-radius:5px;font-size:11.5px;font-weight:500;transition:.1s;color:var(--ink)}
  .btn:hover{border-color:rgba(1,51,38,0.15);background:var(--soft)}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-fg)}
  .spacer{flex:1}
  .page-header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px;margin-bottom:16px}
  .page-header h1{font-size:20px;font-weight:700;letter-spacing:-.035em}
  .page-header p{font-size:11px;color:var(--muted);margin-top:2px}
  .story{margin-top:18px}
  .story-head{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:6px}
  .story-title{font-size:12.5px;font-weight:600;letter-spacing:-.015em}
  .story-sub{font-size:11px;color:var(--muted)}
  .segmented{display:inline-flex;background:var(--soft);border-radius:5px;padding:2px;gap:1px}
  .segment{border:0;background:transparent;color:var(--muted);font-size:11px;font-weight:500;border-radius:4px;padding:4px 10px;transition:.1s}
  .segment:hover{color:var(--ink)}
  .segment.active{background:var(--surface);color:var(--ink);font-weight:550;box-shadow:0 0 0 1px rgba(1,51,38,0.06),0 1px 2px rgba(1,51,38,0.04)}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .kpi{padding:13px 14px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .kpi .lbl{font-size:10.5px;font-weight:550;color:var(--muted);display:flex;align-items:center;gap:5px}
  .kpi .val{font-size:22px;font-weight:700;letter-spacing:-.04em;line-height:1.05;margin-top:4px}
  .kpi .val.em{color:var(--accent)}
  .kpi .sub{font-size:9.5px;color:var(--muted);margin-top:2px}
  .idtag{font-family:ui-monospace,SFMono-Regular,monospace;font-size:8px;color:var(--muted);border:1px solid var(--border);border-radius:3px;padding:1px 3px;flex:none;margin-left:auto;opacity:.7}
  .spark{width:100%;height:26px;margin-top:5px;overflow:visible}
  .support-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .panel{padding:12px 13px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .panel h3{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;letter-spacing:-.01em}
  .panel .sub{font-size:9.5px;color:var(--muted);margin-top:1px}
  .big{font-size:20px;font-weight:700;letter-spacing:-.035em;margin-top:6px}
  .funnel{display:flex;align-items:flex-end;gap:5px;margin-top:10px}
  .f-step{flex:1;text-align:center}
  .f-bar{height:7px;border-radius:99px;background:var(--accent);margin-bottom:3px}
  .f-step:nth-child(2) .f-bar{opacity:.6}.f-step:nth-child(1) .f-bar{opacity:.3}
  .f-step small{font-size:8.5px;color:var(--muted);display:block}.f-step b{font-size:11px}
  .trust-band{padding:11px 13px;display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .trust-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:5px;padding:6px 9px;font-size:10.5px;background:var(--surface)}
  .trust-chip i{width:6px;height:6px;border-radius:50%;flex:none}
  .trust-chip i.ok{background:var(--success)}.trust-chip i.warn{background:var(--warning)}
  .trust-note{margin-left:auto;font-size:9.5px;color:var(--muted);max-width:300px}
  .alert-row{display:flex;gap:7px;align-items:center;padding:9px 13px;border-top:1px solid var(--border);font-size:11px}
  .alert-row svg{width:13px;height:13px;stroke-width:2;fill:none;flex:none}
  .toast{position:fixed;z-index:60;bottom:16px;left:50%;transform:translate(-50%,140px);background:var(--ink);color:var(--bg);font-size:11.5px;font-weight:550;padding:9px 13px;border-radius:6px;box-shadow:0 10px 30px rgba(0,0,0,0.3);transition:.2s;pointer-events:none}
  .toast.show{transform:translate(-50%,0)}
  @media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.support-grid{grid-template-columns:1fr}}
  @media(max-width:740px){
    .app{grid-template-columns:1fr}.sidebar{display:none}
    main{padding:12px 10px 36px}.topbar{margin:-12px -10px 12px;padding:7px 10px}
    .kpi-grid,.support-grid{grid-template-columns:1fr}.trust-note{margin-left:0;max-width:none}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(()=>{
const Sv=v=>`<svg viewBox="0 0 24 24">${v}</svg>`;
const I={
  dash:Sv('<rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/>'),
  stores:Sv('<path d="M3 9l1.5-5h15L21 9M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9M9 20v-6h6v6"/>'),
  sub:Sv('<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18M7 15h4"/>'),
  payouts:Sv('<path d="M4 7h15a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h12M16 13h4"/>'),
  shield:Sv('<path d="M12 3 4.5 6v5c0 4.5 3.2 8.4 7.5 9.8 4.3-1.4 7.5-5.3 7.5-9.8V6z"/><path d="m9 12 2 2 4-4"/>'),
  trust:Sv('<path d="M9 12h6M9 8h6M9 16h3M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/>'),
  bell:Sv('<path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 22h4"/>'),
  sun:Sv('<circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>'),
  moon:Sv('<path d="M20.5 15.2A8.5 8.5 0 0 1 8.8 3.5 8.5 8.5 0 1 0 20.5 15.2Z"/>'),
  alert:Sv('<path d="M12 3 2.8 20h18.4zM12 9v4m0 3h.01"/>'),
  check:Sv('<path d="m5 12 4 4L19 6"/>'),
  menu:Sv('<path d="M4 6h16M4 12h16M4 18h16"/>'),
};
let theme=localStorage.getItem('angkoro-admin-theme')||'light',period='30D',sidebar=false;
const queues={payouts:6,failed:2,bank:3,grace:4,onboard:2};
const P={"7D":{stores:214,subs:2180,orders:861,sales:4120,dStores:'3.1%',dOrders:'6.8%',firstSub:11,firstOrder:9},"30D":{stores:226,subs:8940,orders:3547,sales:17320,dStores:'5.4%',dOrders:'11.2%',firstSub:38,firstOrder:31},"90D":{stores:258,subs:24610,orders:9805,sales:48900,dStores:'9.7%',dOrders:'17.6%',firstSub:97,firstOrder:82}};
const d=()=>P[period];
const fmt=n=>n.toLocaleString('en-US',{maximumFractionDigits:0}),usd=n=>'$'+fmt(n);
function S(c){return`<svg class="spark" viewBox="0 0 120 24" preserveAspectRatio="none" aria-hidden="true"><path d="M0 19 C10 18 14 12 22 15 S36 18 44 12 S56 14 66 9 S80 12 90 8 S104 7 120 3" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round"/></svg>`}

function toast(m){let e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),2000)}
function nvBtn(p,label,ico,badge){return`<button class="nv ${p==='overview'?'active':''}" data-nav="${p}">${I[ico]}<span>${label}</span>${badge?`<b class="badge-dot">${badge}</b>`:''}</button>`}

function sidebarH(){let q=queues;return`<aside class="sidebar ${sidebar?'open':''}">
  <div class="brand"><div class="brand-mark">A</div><div><b>angkoro</b></div></div>
  <div class="nav-label">Platform</div><div class="nav">${nvBtn('overview','Overview','dash')}${nvBtn('stores','Stores','stores')}${nvBtn('subscriptions','Subscriptions','sub')}</div>
  <div class="nav-label">Finance</div><div class="nav">${nvBtn('payouts','Payouts','payouts',q.payouts+q.failed||'')}${nvBtn('bank','Bank verification','shield',q.bank||'')}</div>
  <div class="nav-label">Operations</div><div class="nav">${nvBtn('onboarding','Onboarding','trust',q.onboard||'')}${nvBtn('integrity','Trust & integrity','trust')}</div>
  <div class="side-foot"><div class="avatar">PA</div><div><b>Platform Admin</b><span>Full access</span></div></div></aside>`}
function topbarH(){return`<header class="topbar">
  <button class="btn mobile-menu" data-act="menu" style="padding:0;justify-content:center;width:30px">${I.menu}</button>
  <div style="font-size:14px;font-weight:600;letter-spacing:-.02em">Platform Overview</div>
  <div class="spacer"></div>
  <button class="btn" data-act="theme" style="padding:0;justify-content:center;width:30px">${theme==='dark'?I.sun:I.moon}</button></header>`}

function kpiRow(){let x=d();return`<div class="kpi-grid">
  <div class="kpi"><div class="lbl">Active Paid Stores<span class="idtag">AD-G02</span></div><div class="val em">${fmt(x.stores)}</div><div class="sub"><b style="color:var(--success)">↑ ${x.dStores}</b> vs matched period</div>${S('var(--accent)')}</div>
  <div class="kpi"><div class="lbl">Subscription Collections<span class="idtag">AD-S01</span></div><div class="val">${usd(x.subs)}</div><div class="sub">Cash collected · not MRR</div>${S('#5fd9ae')}</div>
  <div class="kpi"><div class="lbl">Platform Paid Orders<span class="idtag">AD-C01</span></div><div class="val">${fmt(x.orders)}</div><div class="sub"><b style="color:var(--success)">↑ ${x.dOrders}</b> vs previous period</div>${S('#4e7cc2')}</div>
  <div class="kpi"><div class="lbl">Platform Paid Sales<span class="idtag">AD-C02</span></div><div class="val">${usd(x.sales)}</div><div class="sub">Valid paid events · all stores</div>${S('#b87905')}</div>
</div>`}

function attentionStrip(){let q=queues;
  return`<div style="display:flex;align-items:center;gap:0;flex-wrap:wrap;font-size:10.5px">
    <span style="font-size:10px;font-weight:600;color:var(--muted);margin-right:10px">Needs attention</span>
    <span style="display:inline-flex;align-items:center;gap:3px;padding:0 9px 0 0;border-right:1px solid var(--border);cursor:pointer;color:${q.payouts>0?'var(--warning)':'var(--muted)'}" data-act="process-payout"><b style="font-size:13px;font-weight:700">${q.payouts}</b><span style="font-weight:450;color:var(--muted)">payouts<span class="idtag">AD-F01</span></span></span>
    <span style="display:inline-flex;align-items:center;gap:3px;padding:0 9px;border-right:1px solid var(--border);cursor:pointer;color:${q.failed>0?'var(--destructive)':'var(--muted)'}" data-act="open-failed"><b style="font-size:13px;font-weight:700">${q.failed}</b><span style="font-weight:450;color:var(--muted)">failed<span class="idtag">AD-F03</span></span></span>
    <span style="display:inline-flex;align-items:center;gap:3px;padding:0 9px;border-right:1px solid var(--border);cursor:pointer;color:${q.bank>0?'var(--warning)':'var(--muted)'}" data-act="open-bank"><b style="font-size:13px;font-weight:700">${q.bank}</b><span style="font-weight:450;color:var(--muted)">bank<span class="idtag">AD-F06</span></span></span>
    <span style="display:inline-flex;align-items:center;gap:3px;padding:0 0 0 9px;cursor:pointer;color:${q.grace>0?'var(--warning)':'var(--muted)'}" data-act="open-grace"><b style="font-size:13px;font-weight:700">${q.grace}</b><span style="font-weight:450;color:var(--muted)">renewals<span class="idtag">AD-S07</span></span></span>
  </div>`}

function trustBand(){return`<div style="border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)">
  <div class="trust-band">
    <div class="trust-chip"><i class="ok"></i><b>Data Trust</b><span>AD-R06 · Fresh</span></div>
    <div class="trust-chip"><i class="ok"></i><b>Wallet–Ledger</b><span>AD-F08 · Passing</span></div>
    <div class="trust-chip"><i class="ok"></i><b>Plan Entitlement</b><span>AD-O06 · Passing</span></div>
    <div class="trust-chip"><i class="ok"></i><b>Source & Financial</b><span>AD-R07 · Independent</span></div>
    <div class="trust-note">Missing checks show <b>Unknown</b> — never a silent healthy state.</div>
  </div>
  <div class="alert-row" style="color:var(--success)">${I.check}<div><b>All four controls pass.</b><span style="color:var(--muted)"> Affected sections appear as queues the moment a control fails.</span></div><button class="btn" data-act="open-trust" style="margin-left:auto">Evidence</button></div>
</div>`}

function view(){
  return`${topbarH()}
  <div class="page-header"><div><h1>Platform Overview</h1><p>Monitor platform health, operations, and controls.</p></div>${attentionStrip()}</div>
  <section class="story"><div class="story-head"><div><h2 class="story-title">Platform health</h2><div class="story-sub">Is the paid platform operating as expected?</div></div><div class="segmented">${['7D','30D','90D'].map(p=>`<button class="segment ${period===p?'active':''}" data-period="${p}">${p}</button>`).join('')}</div></div>${kpiRow()}</section>
  <section class="story"><div class="story-head"><h2 class="story-title">Trust & control</h2><div class="story-sub">Can you trust the dashboard and money controls?</div></div>${trustBand()}</section>`;
}

function render(){
  document.documentElement.dataset.theme=theme;
  let root=document.getElementById('root');
  root.innerHTML=`<div class="app">${sidebarH()}<main>${view()}</main></div>`;
  root.addEventListener('click',function(e){
    let el=e.target;
    while(el&&el!==root){
      if(el.dataset.period){period=el.dataset.period;render();return}
      if(el.dataset.act){
        let a=el.dataset.act;
        if(a==='theme'){theme=theme==='dark'?'light':'dark';localStorage.setItem('angkoro-admin-theme',theme);render()}
        else if(a==='menu'){sidebar=!sidebar;render()}
        else if(a==='process-payout'){queues.payouts=Math.max(0,queues.payouts-1);render();toast('Payout processed')}
        else if(a==='open-failed')toast('Failed payouts — recovery workflow')
        else if(a==='open-bank')toast('Bank verification — step-up auth required')
        else if(a==='open-grace')toast('Renewal recovery opened')
        else if(a==='open-onboard'){queues.onboard=Math.max(0,queues.onboard-1);render();toast('Onboarding operation retried')}
        else if(a==='open-trust')toast('Trust evidence — independent recomputation')
        return;
      }
      if(el.dataset.nav&&el.dataset.nav!=='overview'){toast(`Go to ${el.textContent.trim()}`);return}
      el=el.parentElement;
    }
  });
}
render();
})();
</script>
</body>
</html>
