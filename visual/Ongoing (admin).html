<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angkoro · Platform Admin — Overview</title>
<style>
  :root{
    --bg:#f8faf9; --surface:#fff; --ink:#0b1e17; --muted:#5b6b63;
    --border:rgba(1,51,38,0.07); --soft:#f1f5f3;
    --accent:#15c089; --accent-fg:#032218; --primary:#013326; --primary-fg:#fff;
    --success:#0b8a5e; --warning:#b45309; --destructive:#c2410c;
    --shadow-card:0 0 0 1px rgba(1,51,38,0.06),0 2px 8px rgba(1,51,38,0.04);
    --shadow-raised:0 0 0 1px rgba(1,51,38,0.08),0 8px 28px rgba(1,51,38,0.08);
    --radius:8px; --radius-sm:6px;
    --font:Inter,system-ui,-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --bg:#080d0b; --surface:#0f1713; --ink:#e4ede8; --muted:#7d9488;
    --border:rgba(255,255,255,0.06); --soft:#141d18;
    --accent:#15c089; --accent-fg:#032218; --primary:#15c089; --primary-fg:#032218;
    --success:#2bc48f; --warning:#e0a33f; --destructive:#f0714f;
    --shadow-card:0 0 0 1px rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.25);
    --shadow-raised:0 0 0 1px rgba(255,255,255,0.07),0 10px 30px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-width:320px}
  button{font:inherit;cursor:pointer;color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}

  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;overflow:auto}
  .brand{display:flex;align-items:center;gap:9px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .brand-mark{width:28px;height:28px;border-radius:var(--radius-sm);background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:13px;font-weight:700;flex:none}
  [data-theme="dark"] .brand-mark{background:var(--accent);color:var(--accent-fg)}
  .brand b{font-size:13.5px;font-weight:600;letter-spacing:-.02em;display:block}
  .brand small{display:block;font-size:10.5px;color:var(--muted)}
  .nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 8px 4px;opacity:.7}
  .nav{display:grid;gap:1px}
  .nav-btn{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;color:var(--muted);padding:8px;border-radius:var(--radius-sm);font-size:13px;font-weight:450;text-align:left;transition:.1s}
  .nav-btn:hover{background:var(--soft);color:var(--ink)}
  .nav-btn.active{background:rgba(21,192,137,0.1);color:var(--accent);font-weight:550}
  .nav-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none}
  .nav-badge{margin-left:auto;font-size:10.5px;font-weight:600;border-radius:99px;padding:1px 7px;background:rgba(180,83,9,0.12);color:var(--warning)}
  .side-foot{margin-top:auto;padding:10px 6px 0;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:10px;font-weight:700;flex:none}
  .side-foot b{font-size:12px;display:block}.side-foot span{font-size:10.5px;color:var(--muted);display:block}

  main{grid-column:2;min-width:0}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:10px 24px;background:rgba(248,250,249,0.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  [data-theme="dark"] .topbar{background:rgba(8,13,11,0.88)}
  .btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);font-size:12px;font-weight:500;transition:.1s}
  .btn:hover{border-color:rgba(1,51,38,0.15);background:var(--soft)}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-fg);font-weight:550}
  [data-theme="dark"] .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
  .btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7}
  .icon-btn{padding:0;justify-content:center;width:32px}
  .spacer{flex:1}

  .content{display:flex;flex-direction:column;padding:20px 24px 48px;max-width:1360px}
  .greet{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:10px}
  .greet h1{font-size:21px;font-weight:650;letter-spacing:-.03em}
  .greet p{font-size:12.5px;color:var(--muted);margin-top:2px}
  .trust-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;font-size:11.5px;font-weight:550;background:rgba(11,138,94,0.08);color:var(--success)}
  .trust-pill.warn{background:rgba(180,83,9,0.1);color:var(--warning)}
  .trust-pill i{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}

  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px}
  .toolbar-label{font-size:11px;font-weight:550;color:var(--muted)}
  .segmented{display:inline-flex;background:var(--soft);border-radius:var(--radius-sm);padding:2px;gap:1px}
  .segment{border:0;background:transparent;color:var(--muted);font-size:12px;font-weight:500;border-radius:5px;padding:5px 11px;transition:.1s}
  .segment:hover{color:var(--ink)}
  .segment.active{background:var(--surface);color:var(--ink);font-weight:550;box-shadow:0 0 0 1px rgba(1,51,38,0.06),0 1px 2px rgba(1,51,38,0.04)}

  .alert-banner{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--radius);font-size:12px;line-height:1.45;margin-top:12px;background:rgba(180,83,9,0.06);border:1px solid rgba(180,83,9,0.2)}
  .alert-banner svg{width:16px;height:16px;stroke:var(--warning);fill:none;stroke-width:2;flex:none}
  .alert-banner b{color:var(--warning);font-weight:600}
  .alert-link{border:0;background:transparent;color:var(--accent);font-size:12px;font-weight:550;padding:0}
  .alert-link:hover{opacity:.8}

  .story{margin-top:24px}
  .story-head{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px}
  .story-title{font-size:13.5px;font-weight:650;letter-spacing:-.015em}
  .story-sub{font-size:12px;color:var(--muted);margin-top:1px}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
  .kpi{padding:15px 16px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);display:flex;flex-direction:column}
  .kpi .lbl{font-size:12px;font-weight:550;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .kpi .val{margin-top:7px;font-size:24px;font-weight:700;letter-spacing:-.03em;line-height:1.05}
  .kpi .subline{margin-top:4px;font-size:11.5px;color:var(--muted)}
  .kpi .subline b{font-weight:600;color:var(--ink)}
  .kpi .subline .pos{color:var(--success);font-weight:600}
  .kpi .subline .neg{color:var(--destructive);font-weight:600}
  .kpi .delta{margin-top:5px;font-size:12px;display:flex;align-items:center;gap:5px;color:var(--muted)}
  .kpi .delta b{font-weight:600}
  .kpi .delta b.up{color:var(--success)}
  .kpi .delta b.down{color:var(--destructive)}
  .spark{width:100%;height:32px;margin-top:9px;display:block}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;flex:none;line-height:1.5}
  .chip.stale{background:rgba(180,83,9,0.1);color:var(--warning)}
  .chip.danger{background:rgba(194,65,12,0.1);color:var(--destructive)}

  .funnel{display:flex;align-items:stretch;gap:0;padding:14px 16px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);overflow-x:auto}
  .f-step{flex:1;min-width:150px;position:relative;padding-right:26px}
  .f-step:last-child{padding-right:0}
  .f-step:not(:last-child):after{content:"→";position:absolute;right:6px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;opacity:.6}
  .f-step .f-lbl{font-size:11.5px;font-weight:550;color:var(--muted)}
  .f-step .f-val{font-size:20px;font-weight:700;letter-spacing:-.025em;margin-top:3px}
  .f-step .f-pct{font-size:11px;color:var(--muted);margin-top:1px}
  .f-bar{height:6px;border-radius:0 4px 4px 0;background:var(--soft);margin-top:8px;overflow:hidden;max-width:92%}
  .f-bar i{display:block;height:100%;border-radius:0 4px 4px 0;background:var(--accent)}

  .queue-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
  .queue{border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);overflow:hidden;display:flex;flex-direction:column}
  .q-head{display:flex;align-items:flex-start;gap:9px;padding:13px 14px 10px}
  .q-ico{width:28px;height:28px;border-radius:var(--radius-sm);display:grid;place-items:center;flex:none}
  .q-ico svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.7;fill:none}
  .q-ico.warn{background:rgba(180,83,9,0.1);color:var(--warning)}
  .q-ico.crit{background:rgba(194,65,12,0.1);color:var(--destructive)}
  .q-head h3{font-size:12.5px;font-weight:600;letter-spacing:-.01em}
  .q-head .q-meta{font-size:10.5px;color:var(--muted);margin-top:2px}
  .q-head .q-meta b{color:var(--warning);font-weight:600}
  .q-count{margin-left:auto;font-size:20px;font-weight:700;letter-spacing:-.03em;line-height:1.1}
  .q-rows{list-style:none;padding:0;border-top:1px solid var(--border);flex:1}
  .q-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11.5px}
  .q-row:last-child{border-bottom:0}
  .q-row:hover{background:var(--soft)}
  .q-row .t{font-weight:550;font-size:12px}
  .q-row .m{font-size:10.5px;color:var(--muted);margin-top:1px}
  .tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;flex:none;font-variant-numeric:tabular-nums}
  .tag.crit{background:rgba(194,65,12,0.1);color:var(--destructive)}
  .tag.warn{background:rgba(180,83,9,0.1);color:var(--warning)}
  .tag.neutral{background:var(--soft);color:var(--muted)}
  .q-act{margin-left:auto;border:1px solid var(--border);background:var(--surface);font-size:10.5px;font-weight:500;border-radius:5px;padding:3px 8px;flex:none;transition:.1s}
  .q-act:hover{border-color:var(--accent);color:var(--accent)}
  .q-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 14px;border-top:1px solid var(--border);font-size:10.5px;color:var(--muted);background:var(--soft)}
  .q-foot button{border:0;background:transparent;color:var(--accent);font-size:11px;font-weight:550;padding:0;flex:none}
  .q-foot button:hover{opacity:.8}
  .caught-up{display:flex;gap:10px;align-items:center;padding:14px 16px;background:rgba(11,138,94,0.06);border:1px solid rgba(11,138,94,0.2);border-radius:var(--radius);font-size:12.5px}
  .caught-up svg{width:28px;height:28px;border-radius:50%;background:var(--success);color:#fff;padding:6px;flex:none;stroke:currentColor;fill:none;stroke-width:2}
  .caught-up b{font-weight:600}
  .caught-up p{font-size:11.5px;color:var(--muted)}

  .ctrl-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
  .ctrl{display:flex;flex-direction:column;gap:4px;padding:12px 14px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);border:0;text-align:left;transition:.1s}
  .ctrl:hover{box-shadow:var(--shadow-raised)}
  .ctrl .c-name{font-size:11.5px;font-weight:550;color:var(--muted)}
  .ctrl .c-state{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:650;letter-spacing:-.01em}
  .ctrl .c-state i{width:7px;height:7px;border-radius:50%;flex:none;background:var(--success)}
  .ctrl.warn .c-state i{background:var(--warning)}
  .ctrl.warn .c-state{color:var(--warning)}
  .ctrl.off .c-state i{background:var(--muted)}
  .ctrl.off .c-state{color:var(--muted)}
  .ctrl .c-time{font-size:10px;color:var(--muted)}

  .layer{position:fixed;inset:0;z-index:40;display:none}.layer.open{display:block}
  .scrim{position:absolute;inset:0;background:rgba(1,20,12,0.35);backdrop-filter:blur(3px)}
  .drawer{position:absolute;top:0;right:0;height:100%;width:min(400px,100%);background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-raised);padding:18px;overflow:auto;animation:slide .15s ease}
  @keyframes slide{from{transform:translateX(12px);opacity:.4}to{transform:none;opacity:1}}
  .drawer h2{font-size:15px;font-weight:650;letter-spacing:-.02em;margin-bottom:2px}
  .drawer .dsub{font-size:11.5px;color:var(--muted);margin-bottom:12px}
  .d-close{float:right;border:1px solid var(--border);background:var(--surface);width:28px;height:28px;border-radius:5px;font-size:13px;color:var(--muted)}
  .facet{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--border);font-size:12px}
  .facet:first-of-type{border-top:0}
  .facet i{width:7px;height:7px;border-radius:50%;flex:none;background:var(--success)}
  .facet.warn i{background:var(--warning)}
  .facet.off i{background:var(--muted)}
  .facet span:last-child{margin-left:auto;font-size:10.5px;color:var(--muted)}
  .d-note{font-size:10.5px;color:var(--muted);margin-top:12px;line-height:1.5}

  .toast{position:fixed;z-index:60;bottom:18px;left:50%;transform:translate(-50%,140px);background:var(--ink);color:var(--bg);font-size:12.5px;font-weight:550;padding:10px 14px;border-radius:var(--radius-sm);box-shadow:var(--shadow-raised);transition:.2s;pointer-events:none}
  .toast.show{transform:translate(-50%,0)}
  .mobile-menu{display:none}

  @media(max-width:1100px){
    .kpi-grid,.queue-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .ctrl-row{grid-template-columns:repeat(2,minmax(0,1fr))}
  }
  @media(max-width:740px){
    .app{grid-template-columns:1fr}
    main{grid-column:1}
    .sidebar{position:fixed;z-index:50;width:240px;transform:translateX(-100%);transition:.2s}
    .sidebar.open{transform:none}
    .mobile-menu{display:inline-flex}
    .content{padding:14px 12px 40px}
    .topbar{padding:8px 12px}
    .kpi-grid,.queue-grid,.ctrl-row{grid-template-columns:minmax(0,1fr)}
    .greet{order:0}.toolbar{order:1}.alert-banner{order:2}
    .story-health{order:4}.story-growth{order:5}.story-attn{order:6}.story-ctrl{order:7}
    .story-attn.has-work{order:3}
  }
  @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

  fail:{count:2,oldest:'4h',due:2,cleared:6,rows:[
    ['4h','crit','PO-1017 · $310.00','Bank rejected transfer'],
    ['2h','warn','PO-1012 · $75.00','Account no longer valid']]},
  bank:{count:8,oldest:'22h',due:2,cleared:11,rows:[
    ['22h','warn','ACLEDA ••••4821','River & Reed · due soon'],
    ['16h','neutral','ABA ••••9034','Palm & Pine'],
    ['9h','neutral','Wing ••••2210','Angkor Living']]},
  grace:{count:14,oldest:'—',due:4,cleared:9,rows:[
    ['9h','crit','Mekong Crafts','Grace expires today'],
    ['31h','warn','Lotus Silk','2nd renewal attempt failed'],
    ['44h','warn','Palm & Pine','Card expired']]}
};
const money=c=>'$'+(c/100).toLocaleString('en-US',{maximumFractionDigits:0});
const fmt=n=>n.toLocaleString('en-US');
const isDeg=()=>state.scenario==='degraded';
const d=()=>state.scenario==='quiet'?DATA.quiet[state.period]:DATA.busy[state.period];
const hasWork=()=>state.scenario!=='quiet';

function deltaHtml(cur,prev,label,unit){
  if(!prev)return`<span>no previous-period data</span>`;
  const p=unit==='pp'?(cur-prev):((cur-prev)/prev*100);
  if(Math.abs(p)<0.05)return`<b>—</b><span>flat vs prev ${label}</span>`;
  const up=p>0;
  return`<b class="${up?'up':'down'}">${up?'↑':'↓'} ${Math.abs(p).toFixed(1)}${unit==='pp'?' pp':'%'}</b><span>vs prev ${label}</span>`;
}
/* deterministic trend shape from prev→cur so sparklines agree with deltas */
const WIG=[0,.35,-.2,.5,.1,.65,.3,.85,.55,.7,.9,1];
function spark(cur,prev){
  const w=280,h=32,p=4,rise=cur-prev;
  const pts=WIG.map((t,i)=>{
    const v=prev+rise*t+(i%3-1)*Math.abs(rise||cur*.04)*.18;
    return v;
  });
  const min=Math.min(...pts),max=Math.max(...pts),r=(max-min)||1;
  const xy=pts.map((v,i)=>[p+i*(w-2*p)/(pts.length-1),h-p-((v-min)/r)*(h-2*p)]);
  const line=xy.map((pt,i)=>(i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1)).join('');
  const area=line+`L${xy[xy.length-1][0].toFixed(1)} ${h-1}L${xy[0][0].toFixed(1)} ${h-1}Z`;
  return`<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
    <path d="${area}" fill="var(--accent)" opacity=".1"/>
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/></svg>`;
}

function nav(id,label,ico,badge,active){return`<button class="nav-btn ${active?'active':''}" data-nav="${id}">${I[ico]}<span>${label}</span>${badge?`<b class="nav-badge">${badge}</b>`:''}</button>`}
function sidebar(){const w=hasWork();return`<aside class="sidebar ${state.sidebar?'open':''}">
  <div class="brand"><div class="brand-mark">A</div><div><b>angkoro</b><small>Platform Admin</small></div></div>
  <div class="nav-label">Platform</div><div class="nav">${nav('overview','Overview','dash','',true)}${nav('stores','Stores','store')}${nav('subs','Subscriptions','card','')}</div>
  <div class="nav-label">Finance</div><div class="nav">${nav('payouts','Payouts','wallet',w?QUEUES.pay.count+QUEUES.fail.count:'')}${nav('bank','Bank verification','bank',w?QUEUES.bank.count:'')}</div>
  <div class="nav-label">Operations</div><div class="nav">${nav('onboard','Onboarding','rocket','')}${nav('trust','Trust & integrity','shield','')}</div>
  <div class="side-foot"><div class="avatar">PA</div><div><b>Platform Admin</b><span>Full access</span></div></div></aside>`}
function topbar(){return`<header class="topbar">
  <button class="btn icon-btn mobile-menu" data-act="menu" aria-label="Menu">${I.menu}</button>
  <div class="spacer"></div>
  <button class="btn icon-btn" data-act="theme" aria-label="Toggle theme">${state.theme==='dark'?I.sun:I.moon}</button>
  <button class="btn icon-btn" data-act="notif" aria-label="Notifications" style="position:relative">${I.bell}${hasWork()?'<span style="position:absolute;top:5px;right:6px;width:5px;height:5px;border-radius:50%;background:var(--warning)"></span>':''}</button></header>`}

function greet(){
  const trust=isDeg()
    ?`<span class="trust-pill warn"><i></i>Data Trust: Partial — last refresh 09:12 (3h ago)</span>`
    :`<span class="trust-pill"><i></i>Data Trust: Fresh · updated 2 min ago · Asia/Phnom_Penh</span>`;
  return`<div class="greet"><div><h1>Platform Overview</h1><p>Monitor platform health, act on operations, verify controls.</p></div>${trust}</div>`}

function toolbar(){
  return`<div class="toolbar">
    <span class="toolbar-label">Prototype state</span>
    <div class="segmented" role="group" aria-label="Prototype state">${['quiet','busy','degraded'].map(s=>`<button class="segment ${state.scenario===s?'active':''}" data-scenario="${s}" aria-pressed="${state.scenario===s}">${s==='quiet'?'Healthy':s[0].toUpperCase()+s.slice(1)}</button>`).join('')}</div>
  </div>`}

function banner(){
  if(isDeg())return`<div class="alert-banner">${I.warn}<div><b>Some data couldn’t be refreshed.</b> Health cards show last values from 09:12. Missing checks display Unknown — never a silent healthy state.</div></div>`;
  if(state.scenario==='busy')return`<div class="alert-banner">${I.warn}<div><b>1 store onboarding failed</b> — “Sunrise Ceramics” webhook timeout at checkout setup. <button class="alert-link" data-act="onboard-fix">Review & retry →</button></div></div>`;
  return''}

function kpis(){
  const x=d(),pl=PL[state.period],deg=isDeg();
  const stale=deg?`<span class="chip stale">Stale · 3h</span>`:'';
  const psrLow=!deg&&state.scenario==='busy';
  return`<div class="kpi-grid">
  <article class="kpi"><div class="lbl">Active Paid Stores ${stale}</div>
    <div class="val">${fmt(x.stores)}</div>
    <div class="subline"><span class="pos">+${x.newS} new</span> · <span class="neg">−${x.churn} churned</span> this period</div>
    <div class="delta">${deltaHtml(x.stores,x.storesPrev,pl)}</div>${spark(x.stores,x.storesPrev)}</article>
  <article class="kpi"><div class="lbl">Subscription MRR ${stale}</div>
    <div class="val">${money(x.mrr)}</div>
    <div class="subline">Cash collected: <b>${money(x.cash)}</b> · last ${pl}</div>
    <div class="delta">${deltaHtml(x.mrr,x.mrrPrev,pl)}</div>${spark(x.mrr,x.mrrPrev)}</article>
  <article class="kpi"><div class="lbl">Platform Paid Sales ${stale}</div>
    <div class="val">${money(x.sales)}</div>
    <div class="subline"><b>${fmt(x.orders)}</b> paid orders · all stores</div>
    <div class="delta">${deltaHtml(x.sales,x.salesPrev,pl)}</div>${spark(x.sales,x.salesPrev)}</article>
  <article class="kpi"><div class="lbl">Payment Success Rate ${deg?stale:(psrLow?'<span class="chip danger">Below band</span>':'')}</div>
    <div class="val">${x.psr.toFixed(1)}%</div>
    <div class="subline">Product <b>${x.psrProd.toFixed(1)}%</b> · Subscriptions <b>${x.psrSub.toFixed(1)}%</b></div>
    <div class="delta">${deltaHtml(x.psr,x.psrPrev,pl,'pp')}</div>${spark(x.psr,x.psrPrev)}</article>
  </div>`}

function health(){
  return`<section class="story story-health"><div class="story-head">
    <div><h2 class="story-title">Platform health</h2><div class="story-sub">Valid paid platform activity · USD</div></div>
    <div class="segmented" role="group" aria-label="Period">${['7D','30D','90D'].map(p=>`<button class="segment ${state.period===p?'active':''}" data-period="${p}" aria-pressed="${state.period===p}">${p}</button>`).join('')}</div>
  </div>${kpis()}</section>`}

function growth(){
  const f=d().fun,steps=['Stores created','Activated','First paid order'];
  return`<section class="story story-growth"><div class="story-head">
    <div><h2 class="story-title">Growth — store activation</h2><div class="story-sub">Where new stores get stuck · last ${PL[state.period]}</div></div></div>
  <div class="funnel">${f.map((v,i)=>`<div class="f-step"><div class="f-lbl">${steps[i]}</div><div class="f-val">${fmt(v)}</div><div class="f-pct">${i===0?'100%':Math.round(v/f[0]*100)+'% of created'}</div><div class="f-bar"><i style="width:${Math.round(v/f[0]*100)}%"></i></div></div>`).join('')}</div></section>`}

function qTile(key,ico,cls,title,sub,slaNote){
  const q=QUEUES[key];
  return`<article class="queue"><div class="q-head"><div class="q-ico ${cls}">${I[ico]}</div>
    <div><h3>${title}</h3><div class="q-meta">${q.oldest!=='—'?`oldest ${q.oldest} · `:''}<b>${q.due} due soon</b></div></div>
    <span class="q-count">${q.count}</span></div>
  <ul class="q-rows">${q.rows.map(r=>`<li class="q-row"><span class="tag ${r[1]}">${r[0]}</span><div><div class="t">${r[2]}</div><div class="m">${r[3]}</div></div><button class="q-act" data-act="open-${key}">Open</button></li>`).join('')}</ul>
  <div class="q-foot"><span>${slaNote} · cleared ${q.cleared} this week</span><button data-act="open-${key}">View all ${q.count} →</button></div></article>`}

function attn(){
  let body;
  if(!hasWork()){
    body=`<div class="caught-up">${I.check}<div><b>All clear.</b><p>No payouts waiting, no failures, no verifications due, no renewals at risk — queues are live and empty.</p></div></div>`;
  }else{
    body=`<div class="queue-grid">
    ${qTile('pay','wallet','warn','Payouts Awaiting','','SLA 2 business days')}
    ${qTile('fail','warn','crit','Failed Payouts','','Triage within 24h')}
    ${qTile('bank','bank','warn','Bank Verification','','SLA 1 business day')}
    ${qTile('grace','clock','warn','Renewals in Grace','','Sorted by next expiry')}
    </div>`;
  }
  return`<section class="story story-attn ${hasWork()?'has-work':''}"><div class="story-head">
    <div><h2 class="story-title">Needs attention</h2><div class="story-sub">Count · oldest age · due soon — closest to breach first. Items close only by explicit disposition.</div></div>
  </div>${body}</section>`}

function controls(){
  const deg=isDeg();
  const chips=[
    {n:'Wallet–Ledger',s:'Passing',t:'checked 09:12',w:false},
    {n:'Plan Entitlement',s:'Passing',t:'checked 09:12',w:false},
    {n:'Dashboard Data Trust',s:deg?'Partial':'Fresh',t:deg?'last refresh 09:12':'2 min ago',w:deg},
    {n:'System Status',s:deg?'Degraded':'OK',t:deg?'14 failed webhooks':'API · jobs · webhooks',w:deg,act:'sysstatus'},
    {n:'Source Reconciliation',s:deg?'Stale':'Passing',t:deg?'last run 4d ago':'last run Sun 02:00',w:deg}
  ];
  return`<section class="story story-ctrl"><div class="story-head">
    <div><h2 class="story-title">Trust &amp; control</h2><div class="story-sub">A check that didn’t run shows Unknown — never green.</div></div></div>
  <div class="ctrl-row">${chips.map(c=>`<button class="ctrl ${c.w?'warn':''}" data-act="${c.act||'ctrl'}"><span class="c-name">${c.n}</span><span class="c-state"><i></i>${c.s}</span><span class="c-time">${c.t}</span></button>`).join('')}</div></section>`}

function view(){
  return`${topbar()}<div class="content">${greet()}${toolbar()}${banner()}${health()}${growth()}${attn()}${controls()}</div>`;
}
function render(){document.documentElement.dataset.theme=state.theme;document.getElementById('root').innerHTML=`<div class="app">${sidebar()}<main>${view()}</main></div>`;bind()}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),2200)}

let lastFocus=null;
function closeDrawer(){document.getElementById('layer-root').innerHTML='';if(lastFocus){lastFocus.focus();lastFocus=null}}
function sysDrawer(){
  lastFocus=document.activeElement;
  const deg=isDeg();
  document.getElementById('layer-root').innerHTML=`<div class="layer open"><div class="scrim" data-close></div><aside class="drawer" role="dialog" aria-modal="true">
    <button class="d-close" data-close aria-label="Close">✕</button>
    <h2>System Status</h2><div class="dsub">v1 signals · AD-R01, R02, R05</div>
    <div class="facet"><i></i><span>API error rate</span><span>0.2% · Sentry · 2m ago</span></div>
    <div class="facet"><i></i><span>Background jobs failed / stuck</span><span>0 · 2m ago</span></div>
    <div class="facet ${deg?'warn':''}"><i></i><span>Payment webhooks failed / unmatched</span><span>${deg?'14 · investigate':'0 · 2m ago'}</span></div>
    <div class="facet off"><i></i><span>Infrastructure capacity</span><span>Not connected</span></div>
    <div class="facet off"><i></i><span>Database backups</span><span>Not connected</span></div>
    <div class="d-note">Not connected means no telemetry is integrated — it is never shown as healthy. Failed webhooks often precede a Payment Success Rate drop.</div></aside></div>`;
  const root=document.getElementById('layer-root');
  root.querySelectorAll('[data-close]').forEach(x=>x.onclick=closeDrawer);
  const c=root.querySelector('.d-close');if(c)c.focus();
}
function act(a){
  if(a==='theme'){state.theme=state.theme==='dark'?'light':'dark';localStorage.setItem('angkoro-admin-theme',state.theme);return render()}
  if(a==='menu'){state.sidebar=!state.sidebar;return render()}
  if(a==='notif')return toast(hasWork()?'25 finance items · 14 renewals at risk':'No urgent items');
  if(a==='sysstatus')return sysDrawer();
  if(a==='ctrl')return toast('Opens the control detail with affected records');
  if(a==='onboard-fix')return toast('Opens onboarding operation — retry with disposition');
  if(a==='open-pay')return toast('Opens Payouts — oldest first, disposition required');
  if(a==='open-fail')return toast('Opens failed payouts — retry / fix account / escalate');
  if(a==='open-bank')return toast('Opens Bank verification — oldest first, step-up for full reveal');
  if(a==='open-grace')return toast('Opens Subscriptions — grace renewals by next expiry');
}
function bind(){
  document.querySelectorAll('[data-act]').forEach(x=>x.onclick=e=>{e.stopPropagation();act(x.dataset.act)});
  document.querySelectorAll('[data-scenario]').forEach(x=>x.onclick=()=>{state.scenario=x.dataset.scenario;render()});
  document.querySelectorAll('[data-period]').forEach(x=>x.onclick=()=>{state.period=x.dataset.period;render()});
  document.querySelectorAll('[data-nav]').forEach(x=>x.onclick=()=>{if(x.dataset.nav==='overview')return;toast(`Go to ${x.textContent.trim()}`)});
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});
render();
})();
</script>
