<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angkoro · Orders — River & Reed</title>
<style>
  :root{
    --bg:#f8faf9; --surface:#fff; --ink:#0b1e17; --muted:#5b6b63;
    --border:rgba(1,51,38,0.07); --soft:#f1f5f3;
    --accent:#15c089; --accent-fg:#032218; --primary:#013326; --primary-fg:#fff;
    --success:#0b8a5e; --warning:#b45309; --destructive:#c2410c; --info:#2563eb;
    --shadow-card:0 0 0 1px rgba(1,51,38,0.06),0 2px 8px rgba(1,51,38,0.04);
    --radius:6px; --font:Inter,system-ui,-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --bg:#080d0b; --surface:#0f1713; --ink:#e4ede8; --muted:#7d9488;
    --border:rgba(255,255,255,0.06); --soft:#141d18;
    --accent:#15c089; --accent-fg:#032218; --primary:#15c089; --primary-fg:#032218;
    --success:#2bc48f; --warning:#e0a33f; --destructive:#f0714f;
    --shadow-card:0 0 0 1px rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.25);
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-width:320px}
  button,input,select{font:inherit}button{cursor:pointer}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;overflow:auto}
  .brand{display:flex;align-items:center;gap:8px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .brand-mark{width:26px;height:26px;border-radius:var(--radius);background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  [data-theme="dark"] .brand-mark{background:var(--accent);color:var(--accent-fg)}
  .brand b{font-size:13px;font-weight:600;letter-spacing:-.02em}.brand small{display:block;font-size:9.5px;color:var(--muted)}
  .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 8px 3px;opacity:.65}
  .nav{display:grid;gap:1px}
  .nav-btn{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;color:var(--muted);padding:7px 8px;border-radius:5px;font-size:12.5px;font-weight:450;text-align:left;transition:.1s}
  .nav-btn:hover{background:var(--soft);color:var(--ink)}
  .nav-btn.active{background:rgba(21,192,137,0.1);color:var(--accent);font-weight:550}
  .nav-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none}
  main{grid-column:2;min-width:0;padding:16px 20px 40px;max-width:1280px}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 20px;margin:-16px -20px 16px;background:rgba(248,250,249,0.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  [data-theme="dark"] .topbar{background:rgba(8,13,11,0.88)}
  .btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border:1px solid var(--border);background:var(--surface);border-radius:5px;font-size:11.5px;font-weight:500;transition:.1s;color:var(--ink)}
  .btn:hover{border-color:rgba(1,51,38,0.15);background:var(--soft)}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-fg);font-weight:550}
  .btn.success{background:var(--success);border-color:var(--success);color:#fff}
  .btn.danger{color:var(--destructive);border-color:rgba(194,65,12,0.2)}
  .spacer{flex:1}
  .page-header{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px}
  .page-header h1{font-size:20px;font-weight:700;letter-spacing:-.035em}
  .page-header p{font-size:11px;color:var(--muted);margin-top:2px}
  .action-section{border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
  .action-section.warn{border-color:rgba(180,83,9,0.3);background:rgba(180,83,9,0.04)}
  .action-section.info{border-color:rgba(37,99,235,0.2);background:rgba(37,99,235,0.03)}
  .as-head{display:flex;align-items:center;gap:7px;padding:10px 12px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border)}
  .as-head.warn{color:var(--warning)}
  .as-head.info{color:var(--info)}
  .as-head svg{width:15px;height:15px;flex:none}
  .as-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border)}
  .as-row:last-child{border-bottom:0}
  .as-row .ord{font-size:11px;font-weight:550}.as-row .cust{font-size:10px;color:var(--muted)}
  .as-row .amt{font-family:ui-monospace,monospace;font-size:11px;font-weight:600}
  .as-actions{display:flex;gap:5px;flex:none}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .kpi{padding:12px 13px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .kpi .lbl{font-size:10.5px;font-weight:550;color:var(--muted)}
  .kpi .val{font-size:20px;font-weight:700;letter-spacing:-.035em;margin-top:3px}
  .panel{border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);overflow:hidden}
  .panel-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .panel-head h2{font-size:12.5px;font-weight:600}
  .o-head{display:grid;grid-template-columns:1fr 80px 80px 90px;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .o-row{display:grid;grid-template-columns:1fr 80px 80px 90px;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:11px}
  .o-row:last-child{border-bottom:0}.o-row:hover{background:var(--soft)}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:8.5px;font-weight:600;padding:2px 6px;border-radius:99px;flex:none}
  .badge.success{background:rgba(11,138,94,0.1);color:var(--success)}
  .badge.warning{background:rgba(180,83,9,0.1);color:var(--warning)}
  .badge.info{background:rgba(37,99,235,0.1);color:var(--info)}
  .badge.muted{background:var(--soft);color:var(--muted)}
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tab{border:0;background:transparent;font-size:11.5px;font-weight:500;color:var(--muted);padding:5px 0 7px;border-bottom:2px solid transparent;transition:.1s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);font-weight:600;border-bottom-color:var(--accent)}
  .toast{position:fixed;z-index:60;bottom:16px;left:50%;transform:translate(-50%,140px);background:var(--ink);color:var(--bg);font-size:11.5px;font-weight:550;padding:9px 13px;border-radius:6px;box-shadow:0 10px 30px rgba(0,0,0,0.3);transition:.2s;pointer-events:none}
  .toast.show{transform:translate(-50%,0)}
  @media(max-width:740px){
    .app{grid-template-columns:1fr}.sidebar{display:none}
    main{padding:12px 10px 36px}
    .topbar{margin:-12px -10px 12px;padding:7px 10px}
    .kpi-row{grid-template-columns:repeat(2,1fr)}
    .o-head,.o-row{grid-template-columns:1fr 60px 60px 70px}
    .as-row{flex-wrap:wrap}
    .as-actions{width:100%;justify-content:flex-end}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(()=>{
const I={
  dash:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
  orders:'<svg viewBox="0 0 24 24"><path d="M6 3h12l2 4-8 5-8-5zM4 7v11l8 4 8-4V7M12 12v10"/></svg>',
  box:'<svg viewBox="0 0 24 24"><path d="m3 7 9-4 9 4-9 4zM3 7v10l9 4 9-4V7M12 11v10"/></svg>',
  wallet:'<svg viewBox="0 0 24 24"><path d="M4 7h15a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h12M16 13h4"/></svg>',
  chart:'<svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 16v-4M12 16V7M16 16v-7"/></svg>',
  settings:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="m19.4 15 .1 2.2-2.1 1.2-1.7-1a7.8 7.8 0 0 1-1.8 1l-.1 2H11l-.9-2a7.8 7.8 0 0 1-1.8-1l-1.7 1-2.1-1.2.1-2.2a8.3 8.3 0 0 1 0-2l-.1-2.2 2.1-1.2 1.7 1a7.8 7.8 0 0 1 1.8-1l.9-2h2l.9 2a7.8 7.8 0 0 1 1.8 1l1.7-1 2.1 1.2-.1 2.2a8.3 8.3 0 0 1 0 2Z"/></svg>',
  alert:'<svg viewBox="0 0 24 24"><path d="M12 3 2.8 20h18.4zM12 9v4m0 3h.01"/></svg>',
  check:'<svg viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></svg>',
  x:'<svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  truck:'<svg viewBox="0 0 24 24"><path d="M14 18v-2h3.5a2.5 2.5 0 0 0 0-5h-1a2.5 2.5 0 0 0-5 0H10v5H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7l6 6v4"/><circle cx="8" cy="19" r="2"/><circle cx="18" cy="19" r="2"/></svg>',
  cash:'<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 8h20M6 12h4"/></svg>',
  sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon:'<svg viewBox="0 0 24 24"><path d="M20.5 15.2A8.5 8.5 0 0 1 8.8 3.5 8.5 8.5 0 1 0 20.5 15.2Z"/></svg>',
};
const theme=localStorage.getItem('angkoro-theme')||'light';
const fmt=n=>'$'+(n/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

const pendingDecision=[
  {id:'ORD-4839',orderNumber:'#ORD-4839',customer:'Dara Chum',total:6800,status:'PENDING'},
  {id:'ORD-4834',orderNumber:'#ORD-4834',customer:'Sokly',total:2250,status:'PENDING'},
];
const readyToFulfill=[
  {id:'ORD-4837',orderNumber:'#ORD-4837',customer:'Lina V.',total:2900,status:'ACCEPTED'},
  {id:'ORD-4830',orderNumber:'#ORD-4830',customer:'Kong Kea',total:1450,status:'ACCEPTED'},
];
const codCollect=[
  {id:'ORD-4828',orderNumber:'#ORD-4828',customer:'Theary',total:1850,status:'COD_PLACED'},
];
const allOrders=[
  {id:'ORD-4839',orderNumber:'#ORD-4839',customer:'Dara Chum',total:6800,status:'PENDING',date:'Jul 19'},
  {id:'ORD-4837',orderNumber:'#ORD-4837',customer:'Lina V.',total:2900,status:'ACCEPTED',date:'Jul 19'},
  {id:'ORD-4834',orderNumber:'#ORD-4834',customer:'Sokly',total:2250,status:'PENDING',date:'Jul 18'},
  {id:'ORD-4830',orderNumber:'#ORD-4830',customer:'Kong Kea',total:1450,status:'ACCEPTED',date:'Jul 18'},
  {id:'ORD-4828',orderNumber:'#ORD-4828',customer:'Theary',total:1850,status:'COD_PLACED',date:'Jul 17'},
  {id:'ORD-4822',orderNumber:'#ORD-4822',customer:'Guest',total:4200,status:'COMPLETED',date:'Jul 16'},
  {id:'ORD-4817',orderNumber:'#ORD-4817',customer:'Sopheap',total:5600,status:'SHIPPED',date:'Jul 15'},
  {id:'ORD-4814',orderNumber:'#ORD-4814',customer:'Bopha',total:3100,status:'COMPLETED',date:'Jul 14'},
];

const statusBadge=s=>{
  const m=s.toLowerCase();
  if(m.includes('complete')||m==='paid')return'badge success';
  if(m.includes('pending')||m.includes('cod'))return'badge warning';
  if(m.includes('accept')||m==='shipped')return'badge info';
  return'badge muted';
};

function nav(id,label,ico,active){return`<button class="nav-btn ${active?'active':''}" onclick="toast('${label} page')">${I[ico]}<span>${label}</span></button>`}
function sidebar(){return`<aside class="sidebar">
  <div class="brand"><div class="brand-mark">RR</div><div><b>River & Reed</b><small>river-reed.telestore.app</small></div></div>
  <div class="nav-label">Workspace</div><div class="nav">${nav('overview','Overview','dash')}${nav('orders','Orders','orders',true)}${nav('products','Products','box')}${nav('inventory','Inventory','box')}</div>
  <div class="nav-label">Insights</div><div class="nav">${nav('analytics','Analytics','chart')}${nav('payments','Payments','wallet')}${nav('settings','Settings','settings')}</div></aside>`}
function topbar(){return`<header class="topbar"><div class="spacer"></div><button class="btn" onclick="(function(){let t=theme==='dark'?'light':'dark';localStorage.setItem('angkoro-theme',t);document.documentElement.dataset.theme=t;location.reload()})()">${theme==='dark'?I.sun:I.moon}</button></header>`}
function toast(m){let e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),2000)}
document.documentElement.dataset.theme=theme;

document.getElementById('root').innerHTML=`<div class="app">${sidebar()}<main>${topbar()}
  <div class="page-header"><div><h1>Orders</h1><p>Manage orders and fulfillments</p></div></div>

  ${pendingDecision.length||readyToFulfill.length||codCollect.length?`<div style="margin-bottom:14px">
    ${pendingDecision.length?`<div class="action-section warn">
      <div class="as-head warn">${I.alert} Awaiting Your Decision (${pendingDecision.length})</div>
      ${pendingDecision.map(o=>`<div class="as-row">
        <div><div class="ord">${o.orderNumber}</div><div class="cust">${o.customer}</div></div>
        <span class="amt">${fmt(o.total)}</span>
        <div class="as-actions">
          <button class="btn danger" onclick="toast('Order ${o.id} rejected')">${I.x} Reject</button>
          <button class="btn success" onclick="toast('Order ${o.id} accepted')">${I.check} Accept</button>
        </div></div>`).join('')}
    </div>`:''}
    ${readyToFulfill.length?`<div class="action-section info">
      <div class="as-head info">${I.truck} Ready to Fulfill (${readyToFulfill.length})</div>
      ${readyToFulfill.map(o=>`<div class="as-row">
        <div><div class="ord">${o.orderNumber}</div><div class="cust">${o.customer}</div></div>
        <span class="amt">${fmt(o.total)}</span>
        <button class="btn primary" onclick="toast('Order ${o.id} marked fulfilled')">${I.truck} Mark Fulfilled</button></div>`).join('')}
    </div>`:''}
    ${codCollect.length?`<div class="action-section info">
      <div class="as-head info">${I.cash} COD — Ready to Collect (${codCollect.length})</div>
      ${codCollect.map(o=>`<div class="as-row">
        <div><div class="ord">${o.orderNumber}</div><div class="cust">${o.customer}</div></div>
        <span class="amt">${fmt(o.total)}</span>
        <button class="btn primary" onclick="toast('Order ${o.id} cash collected')">${I.cash} Mark Collected</button></div>`).join('')}
    </div>`:''}
  </div>`:''}

  <div class="kpi-row">
    <div class="kpi"><div class="lbl">Total orders</div><div class="val">${allOrders.length}</div></div>
    <div class="kpi"><div class="lbl">Awaiting decision</div><div class="val">${pendingDecision.length}</div></div>
    <div class="kpi"><div class="lbl">Ready to fulfill</div><div class="val">${readyToFulfill.length}</div></div>
  </div>

  <div class="panel">
    <div class="panel-head"><h2>All orders</h2></div>
    <div class="o-head"><span>Order</span><span>Amount</span><span>Date</span><span>Status</span></div>
    ${allOrders.map(o=>`<div class="o-row">
      <div><div style="font-size:11px;font-weight:550">${o.orderNumber}</div><div style="font-size:9px;color:var(--muted)">${o.customer}</div></div>
      <span style="font-family:ui-monospace,monospace;font-size:11px;font-weight:600">${fmt(o.total)}</span>
      <span style="font-size:10px;color:var(--muted)">${o.date}</span>
      <span class="${statusBadge(o.status)}">${o.status.replace('_',' ')}</span>
    </div>`).join('')}
  </div>
</main></div>`;
})();
</script>
</body>
</html>
