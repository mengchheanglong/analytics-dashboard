<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angkoro · Payments — River & Reed</title>
<style>
  :root{
    --bg:#f8faf9; --surface:#fff; --ink:#0b1e17; --muted:#5b6b63;
    --border:rgba(1,51,38,0.07); --soft:#f1f5f3; --card:#fff;
    --accent:#15c089; --accent-fg:#032218; --primary:#013326; --primary-fg:#fff;
    --success:#0b8a5e; --warning:#b45309; --destructive:#c2410c;
    --shadow-card:0 0 0 1px rgba(1,51,38,0.06),0 2px 8px rgba(1,51,38,0.04);
    --shadow-raised:0 0 0 1px rgba(1,51,38,0.08),0 8px 28px rgba(1,51,38,0.08);
    --radius:6px; --radius-lg:8px;
    --font:Inter,system-ui,-apple-system,sans-serif;
  }
  [data-theme="dark"]{
    --bg:#080d0b; --surface:#0f1713; --ink:#e4ede8; --muted:#7d9488;
    --border:rgba(255,255,255,0.06); --soft:#141d18;
    --accent:#15c089; --accent-fg:#032218; --primary:#15c089; --primary-fg:#032218;
    --success:#2bc48f; --warning:#e0a33f; --destructive:#f0714f;
    --shadow-card:0 0 0 1px rgba(255,255,255,0.05),0 2px 8px rgba(0,0,0,0.25);
    --shadow-raised:0 0 0 1px rgba(255,255,255,0.07),0 10px 30px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;margin:0}
  html{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  body{min-width:320px}
  button{font:inherit;cursor:pointer;color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;overflow:auto}
  .brand{display:flex;align-items:center;gap:8px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
  .brand-mark{width:26px;height:26px;border-radius:var(--radius);background:var(--primary);color:var(--primary-fg);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  [data-theme="dark"] .brand-mark{background:var(--accent);color:var(--accent-fg)}
  .brand b{font-size:13px;font-weight:600;letter-spacing:-.02em}
  .brand small{display:block;font-size:9.5px;color:var(--muted)}
  .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 8px 3px;opacity:.65}
  .nav{display:grid;gap:1px}
  .nav-btn{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;color:var(--muted);padding:7px 8px;border-radius:5px;font-size:12.5px;font-weight:450;text-align:left;transition:.1s}
  .nav-btn:hover{background:var(--soft);color:var(--ink)}
  .nav-btn.active{background:rgba(21,192,137,0.1);color:var(--accent);font-weight:550}
  .nav-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none}
  main{grid-column:2;min-width:0;padding:16px 20px 40px;max-width:1200px}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 20px;margin:-16px -20px 16px;background:rgba(248,250,249,0.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  [data-theme="dark"] .topbar{background:rgba(8,13,11,0.88)}
  .btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border:1px solid var(--border);background:var(--surface);border-radius:5px;font-size:11.5px;font-weight:500;transition:.1s}
  .btn:hover{border-color:rgba(1,51,38,0.15);background:var(--soft)}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-fg);font-weight:550}
  .btn.danger{color:var(--destructive);border-color:rgba(194,65,12,0.2)}
  .btn.danger:hover{background:rgba(194,65,12,0.06)}
  .spacer{flex:1}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px}
  .page-header h1{font-size:20px;font-weight:700;letter-spacing:-.035em}
  .page-header p{font-size:11px;color:var(--muted);margin-top:2px}
  .wallet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  .w-card{padding:13px 14px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card)}
  .w-card .lbl{font-size:10.5px;font-weight:550;color:var(--muted)}
  .w-card .val{font-size:22px;font-weight:700;letter-spacing:-.04em;line-height:1.05;margin-top:4px}
  .w-card .val.em{color:var(--accent)}
  .w-card .sub{font-size:10px;color:var(--muted);margin-top:2px}
  .section-card{border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-card);overflow:hidden;margin-bottom:16px}
  .section-card .sc-head{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 14px;border-bottom:1px solid var(--border)}
  .section-card .sc-head h2{font-size:13px;font-weight:600;letter-spacing:-.015em}
  .section-card .sc-head p{font-size:10px;color:var(--muted);margin-top:2px}
  .section-card .sc-body{padding:12px 14px}
  .acct-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:5px;margin-bottom:6px}
  .acct-row:last-child{margin-bottom:0}
  .acct-row svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.6;flex:none;color:var(--muted)}
  .acct-row .info{flex:1;min-width:0}
  .acct-row b{font-size:12px;font-weight:600}.acct-row span{font-size:10px;color:var(--muted)}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 6px;border-radius:99px;flex:none}
  .badge.success{background:rgba(11,138,94,0.1);color:var(--success);border:1px solid rgba(11,138,94,0.2)}
  .badge.warning{background:rgba(180,83,9,0.1);color:var(--warning);border:1px solid rgba(180,83,9,0.2)}
  .badge.neutral{background:var(--soft);color:var(--muted)}
  .acct-actions{display:flex;gap:4px;flex:none}.acct-actions button{width:24px;height:24px;border:0;background:transparent;border-radius:4px;display:grid;place-items:center;font-size:12px}
  .acct-actions button:hover{background:var(--soft)}
  .payout-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:5px;margin-bottom:6px}
  .payout-row:last-child{margin-bottom:0}
  .payout-row .amt{font-size:13px;font-weight:650;font-family:ui-monospace,SFMono-Regular,monospace}
  .payout-row .meta{font-size:10px;color:var(--muted)}
  .empty{text-align:center;padding:24px 12px;color:var(--muted);font-size:12px}
  .empty svg{width:28px;height:28px;stroke:var(--muted);opacity:.4;margin-bottom:6px}
  .ledger-row{display:grid;grid-template-columns:80px 1fr 80px 40px;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:10.5px}
  .ledger-row:last-child{border-bottom:0}
  .toast{position:fixed;z-index:60;bottom:16px;left:50%;transform:translate(-50%,140px);background:var(--ink);color:var(--bg);font-size:11.5px;font-weight:550;padding:9px 13px;border-radius:6px;box-shadow:var(--shadow-raised);transition:.2s;pointer-events:none}
  .toast.show{transform:translate(-50%,0)}
  .layer{position:fixed;inset:0;z-index:40;display:none}
  .layer.open{display:block}
  .scrim{position:absolute;inset:0;background:rgba(1,20,12,0.35);backdrop-filter:blur(3px)}
  .drawer{position:absolute;top:0;right:0;height:100%;width:min(420px,100%);background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-raised);padding:16px;overflow:auto;animation:slide .15s ease}
  @keyframes slide{from{transform:translateX(12px);opacity:.4}to{transform:none;opacity:1}}
  .drawer h2{font-size:14px;font-weight:650;letter-spacing:-.02em}
  .drawer .dsub{font-size:10px;color:var(--muted);margin-bottom:12px}
  .d-close{float:right;border:1px solid var(--border);background:var(--surface);width:26px;height:26px;border-radius:4px;font-size:12px;color:var(--muted)}
  .form-group{margin-bottom:10px}
  .form-group label{display:block;font-size:10.5px;font-weight:550;color:var(--muted);margin-bottom:3px}
  .form-group input,.form-group select{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:5px;font-size:11.5px;background:var(--surface);color:var(--ink)}
  .form-row{display:flex;gap:6px;margin-top:8px}
  @media(max-width:740px){
    .app{grid-template-columns:1fr}
    .sidebar{display:none}
    main{padding:12px 10px 36px}
    .topbar{margin:-12px -10px 12px;padding:7px 10px}
    .wallet-grid{grid-template-columns:repeat(2,1fr)}
    .ledger-row{grid-template-columns:70px 1fr 60px 30px}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="layer-root"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(()=>{
const I={
  dash:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>',
  orders:'<svg viewBox="0 0 24 24"><path d="M6 3h12l2 4-8 5-8-5zM4 7v11l8 4 8-4V7M12 12v10"/></svg>',
  box:'<svg viewBox="0 0 24 24"><path d="m3 7 9-4 9 4-9 4zM3 7v10l9 4 9-4V7M12 11v10"/></svg>',
  wallet:'<svg viewBox="0 0 24 24"><path d="M4 7h15a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h12M16 13h4"/></svg>',
  store:'<svg viewBox="0 0 24 24"><path d="M3 9l1.5-5h15L21 9M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9M9 20v-6h6v6"/></svg>',
  chart:'<svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 16v-4M12 16V7M16 16v-7"/></svg>',
  settings:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="m19.4 15 .1 2.2-2.1 1.2-1.7-1a7.8 7.8 0 0 1-1.8 1l-.1 2H11l-.9-2a7.8 7.8 0 0 1-1.8-1l-1.7 1-2.1-1.2.1-2.2a8.3 8.3 0 0 1 0-2l-.1-2.2 2.1-1.2 1.7 1a7.8 7.8 0 0 1 1.8-1l.9-2h2l.9 2a7.8 7.8 0 0 1 1.8 1l1.7-1 2.1 1.2-.1 2.2a8.3 8.3 0 0 1 0 2Z"/></svg>',
  plus:'<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',
  bank:'<svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="12" rx="2"/><path d="M3 12h18M8 17h4"/></svg>',
  check:'<svg viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></svg>',
  star:'<svg viewBox="0 0 24 24"><polygon points="12 2 15 8.5 22 9.5 17 14 18 21 12 17.5 6 21 7 14 2 9.5 9 8.5"/></svg>',
  trash:'<svg viewBox="0 0 24 24"><path d="M4 6h16M6 6v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M10 10v7M14 10v7"/></svg>',
  sun:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon:'<svg viewBox="0 0 24 24"><path d="M20.5 15.2A8.5 8.5 0 0 1 8.8 3.5 8.5 8.5 0 1 0 20.5 15.2Z"/></svg>',
  down:'<svg viewBox="0 0 24 24"><path d="M8 7l4 4 4-4M8 16l4 4 4-4"/></svg>',
};
const fmt=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const F=(c,u='USD')=>'$'+fmt(c/100);
const D=(iso)=>new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

const wallet={availableBalance:78000,pendingBalance:105000,escrowBalance:42000,totalPaidOut:214000,currency:'USD',updatedAt:'2026-07-19T18:30:00.000Z'};
const accounts=[
  {id:'ba_01',accountHolder:'River & Reed',bankName:'ABA Bank',accountNumberLast4:'4821',status:'VERIFIED',isDefault:true},
  {id:'ba_02',accountHolder:'Long Mengchheang',bankName:'ACLEDA Bank',accountNumberLast4:'9034',status:'PENDING',isDefault:false},
];
const payouts=[
  {id:'po_001',amount:64000,currency:'USD',status:'PROCESSING',createdAt:'2026-07-18T09:00:00Z'},
  {id:'po_002',amount:31000,currency:'USD',status:'PENDING',createdAt:'2026-07-14T14:30:00Z'},
  {id:'po_003',amount:50000,currency:'USD',status:'COMPLETED',createdAt:'2026-07-01T10:00:00Z'},
];
const ledger=[
  {type:'SALE',amount:12900,date:'2026-07-19',desc:'ORD-4839 · Dara Chum'},
  {type:'SALE',amount:8500,date:'2026-07-19',desc:'ORD-4837 · Sokly'},
  {type:'PAYOUT',amount:-50000,date:'2026-07-01',desc:'Bank transfer completed'},
  {type:'SUBSCRIPTION_FEE',amount:-2900,date:'2026-07-01',desc:'Monthly plan renewal'},
  {type:'REFUND',amount:-2200,date:'2026-06-28',desc:'ORD-4792 · customer refund'},
];
const TYPE_LABEL={SALE:'Sale',PAYOUT:'Payout',SUBSCRIPTION_FEE:'Subscription Fee',REFUND:'Refund',FEE:'Fee'};
const TYPE_COLOR={SALE:'success',PAYOUT:'info',SUBSCRIPTION_FEE:'warning',REFUND:'destructive',FEE:'neutral'};

const theme=localStorage.getItem('angkoro-theme')||'light';
function setTheme(t){document.documentElement.dataset.theme=t;localStorage.setItem('angkoro-theme',t);}

function sidebar(){
  return`<aside class="sidebar">
  <div class="brand"><div class="brand-mark">RR</div><div><b>River & Reed</b><small>river-reed.telestore.app</small></div></div>
  <div class="nav-label">Workspace</div><div class="nav">
    <button class="nav-btn">${I.dash}<span>Overview</span></button>
    <button class="nav-btn">${I.orders}<span>Orders</span></button>
    <button class="nav-btn">${I.box}<span>Products</span></button>
    <button class="nav-btn">${I.box}<span>Inventory</span></button></div>
  <div class="nav-label">Insights</div><div class="nav">
    <button class="nav-btn">${I.chart}<span>Analytics</span></button>
    <button class="nav-btn active">${I.wallet}<span>Payments</span></button>
    <button class="nav-btn">${I.settings}<span>Settings</span></button></div></aside>`;
}
function topbar(){return`<header class="topbar"><div class="spacer"></div><button class="btn" onclick="(function(){let t=theme==='dark'?'light':'dark';setTheme(t);location.reload()})()">${theme==='dark'?I.sun:I.moon}</button></header>`}
function walletCards(){
  return`<div class="wallet-grid">
    <div class="w-card"><div class="lbl">Available</div><div class="val em">${F(wallet.availableBalance)}</div><div class="sub">Ready to withdraw</div></div>
    <div class="w-card"><div class="lbl">Pending</div><div class="val">${F(wallet.pendingBalance)}</div><div class="sub">Awaiting settlement</div></div>
    <div class="w-card"><div class="lbl">In Escrow</div><div class="val">${F(wallet.escrowBalance)}</div><div class="sub">Pending decisions</div></div>
    <div class="w-card"><div class="lbl">Total Paid Out</div><div class="val">${F(wallet.totalPaidOut)}</div><div class="sub">Updated ${D(wallet.updatedAt)}</div></div>
  </div>`;
}
function bankAccounts(){
  return`<div class="section-card">
    <div class="sc-head"><div><h2>Bank Accounts</h2><p>Accounts verified for payouts</p></div><button class="btn primary" onclick="toast('Add bank account dialog opened')">${I.plus} Add Account</button></div>
    <div class="sc-body">${accounts.map(a=>`<div class="acct-row">
      ${I.bank}<div class="info"><b>${a.accountHolder}</b><br><span>${a.bankName} · ••••${a.accountNumberLast4}</span></div>
      <span class="badge ${a.status==='VERIFIED'?'success':'warning'}">${a.status==='VERIFIED'?I.check:''}${a.status}</span>
      ${a.isDefault?`<span class="badge neutral">Default</span>`:''}
      <div class="acct-actions">
        ${!a.isDefault&&a.status==='VERIFIED'?`<button title="Set as default" onclick="toast('Default account updated')">${I.star}</button>`:''}
        <button style="color:var(--destructive)" onclick="if(confirm('Remove this account?'))toast('Account removed')">${I.trash}</button>
      </div></div>`).join('')}
      ${accounts.length===0?'<div class="empty">No bank accounts yet</div>':''}
    </div></div>`;
}
function payoutHistory(){
  return`<div class="section-card">
    <div class="sc-head"><div><h2>Payout History</h2><p>Your payout requests and their status</p></div><button class="btn primary" onclick="toast('Request payout dialog opened')">${I.down} Request Payout</button></div>
    <div class="sc-body">${payouts.map(p=>`<div class="payout-row">
      <div><div class="amt">${F(p.amount,p.currency)}</div><div class="meta">${D(p.createdAt)}</div></div>
      <span class="badge ${p.status==='COMPLETED'?'success':p.status==='PROCESSING'?'warning':'warning'}">${p.status}</span>
      ${p.status!=='COMPLETED'?`<button class="btn danger" onclick="toast('Payout cancelled')">Cancel</button>`:''}
    </div>`).join('')}
    </div></div>`;
}
function transactionLedger(){
  return`<div class="section-card">
    <div class="sc-head"><h2>Transaction Ledger</h2></div>
    <div class="sc-body" style="padding:0 14px">
      <div class="ledger-row" style="font-size:9px;color:var(--muted);font-weight:550;border-bottom:1px solid var(--border)"><span>Date</span><span>Description</span><span>Amount</span><span>Type</span></div>
      ${ledger.map(l=>`<div class="ledger-row">
        <span style="color:var(--muted)">${l.date}</span><span>${l.desc}</span>
        <span style="font-weight:600;font-family:ui-monospace,monospace;color:${l.amount<0?'var(--destructive)':'var(--success)'}">${F(Math.abs(l.amount))}</span>
        <span class="badge ${TYPE_COLOR[l.type]}" style="font-size:8px">${TYPE_LABEL[l.type]}</span>
      </div>`).join('')}
    </div></div>`;
}
function toast(m){let e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),2000)}
setTheme(theme);
document.getElementById('root').innerHTML=`<div class="app">${sidebar()}<main>${topbar()}
  <div class="page-header"><div><h1>Payments</h1><p>Store balance & payouts · River & Reed</p></div></div>
  ${walletCards()}${bankAccounts()}${payoutHistory()}${transactionLedger()}
</main></div>`;
})();
</script>
</body>
</html>
